<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category - Night Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { black: '#050505', dark: '#0a0a0a', gray: '#171717', light: '#e5e5e5', yellow: '#FFD700', green: '#22C55E', accent: '#8CFF00' } } } } }
    </script>
    <style>
        * { cursor: none; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0a0a0a; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; } ::selection { background: white; color: black; }
        
        #cursor-dot { width: 8px; height: 8px; background: white; position: fixed; pointer-events: none; z-index: 99999; border-radius: 50%; mix-blend-mode: difference; }
        #cursor-ring { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.8); position: fixed; pointer-events: none; z-index: 99998; border-radius: 50%; transition: width 0.15s; }
        
        .product-card:hover .product-image { transform: scale(1.05); }
        
        .profile-dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 10px; background: #171717; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; width: 250px; z-index: 100; }
        .profile-dropdown.open { display: block; }

        /* Map Overrides */
        #locationMap { height: 200px; width: 100%; background: #000; z-index: 10; }
        .leaflet-container { background: #000; }
        .leaflet-control-zoom { display: none; }
    </style>
</head>
<body class="bg-brand-black text-white font-sans antialiased">
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- LOCATION MODAL -->
    <div id="locationModal" class="fixed inset-0 z-[200] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="bg-brand-gray rounded-3xl w-full max-w-2xl border border-white/10 shadow-2xl overflow-hidden max-h-[95vh] flex flex-col">
            <div class="p-6 border-b border-white/5 flex items-center justify-between flex-shrink-0"><h3 class="font-semibold text-lg">Save Delivery Address</h3><button onclick="closeLocationModal()" class="text-neutral-400 hover:text-white"><iconify-icon icon="lucide:x" width="24"></iconify-icon></button></div>
            <div class="flex-1 overflow-y-auto">
                <div class="p-4 bg-brand-black/50 relative z-20"><input type="text" id="locationSearchInput" onkeyup="searchLocation()" placeholder="Search area..." class="w-full bg-brand-gray border border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none"><div id="searchResults" class="mt-2 space-y-1 max-h-24 overflow-y-auto hidden absolute left-4 right-4 bg-brand-gray rounded-lg p-2 border border-white/10"></div></div>
                <div id="locationMap" class="w-full flex-shrink-0"></div>
                <div class="p-6 space-y-4">
                    <div class="flex items-center gap-2 mb-2"><iconify-icon icon="lucide:navigation" width="16" class="text-brand-accent"></iconify-icon><span id="selectedAreaText" class="text-sm font-medium text-brand-accent">Move map to select</span></div>
                    <div class="grid grid-cols-3 gap-3"><button onclick="setLabel('Home')" id="labelHome" class="label-btn border border-white/10 py-2 rounded-lg text-xs font-medium hover:border-brand-accent transition-colors">Home</button><button onclick="setLabel('Work')" id="labelWork" class="label-btn border border-white/10 py-2 rounded-lg text-xs font-medium hover:border-brand-accent transition-colors">Work</button><button onclick="setLabel('Other')" id="labelOther" class="label-btn border border-white/10 py-2 rounded-lg text-xs font-medium hover:border-brand-accent transition-colors">Other</button></div>
                    <div><label class="text-xs text-neutral-500 block mb-1">House / Flat No.</label><input type="text" id="inputHouse" placeholder="House/Flat No." class="w-full bg-brand-black border border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none"></div>
                    <div><label class="text-xs text-neutral-500 block mb-1">Sector / Building</label><input type="text" id="inputBuilding" placeholder="Building Name" class="w-full bg-brand-black border border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none"></div>
                </div>
            </div>
            <div class="p-4 border-t border-white/5 bg-brand-dark flex-shrink-0"><button onclick="saveAndConfirmAddress()" class="w-full bg-brand-accent text-black font-semibold py-3 rounded-xl hover:bg-brand-yellow transition-colors text-sm">Save Address & Confirm</button></div>
        </div>
    </div>

    <!-- Navigation (Updated) -->
    <nav class="fixed top-0 left-0 right-0 z-30 bg-brand-black/90 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a href="index.html" class="flex items-center group hover:opacity-80 transition-opacity pr-4">
                     <svg width="140" height="50" viewBox="0 0 300 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M35 5 A25 25 0 1 1 35 55 A20 20 0 1 0 35 5" fill="white"/><g transform="translate(12, 18) scale(0.8)" fill="#8CFF00"><path d="M0 0 L4 0 L6 12 L30 12 L28 4 L8 4 L8 2 L30 2 L34 16 L4 16 L0 0 Z" /><circle cx="10" cy="22" r="4" /><circle cx="26" cy="22" r="4" /></g><text x="85" y="60" font-family="'Inter', sans-serif" font-weight="700" font-size="32"><tspan fill="white">Night</tspan><tspan fill="#8CFF00">cart</tspan></text></svg>
                </a>

                <!-- Center Group: Location Btn + Search -->
                <div class="flex-1 flex items-center gap-3">
                    <button onclick="openLocationModal()" class="hidden md:flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-full hover:border-brand-accent/50 transition-colors flex-shrink-0">
                        <iconify-icon icon="lucide:map-pin" width="16" class="text-brand-accent"></iconify-icon>
                        <span id="navLocationText" class="text-sm font-medium truncate max-w-[100px] lg:max-w-[200px]">Select</span>
                        <iconify-icon icon="lucide:chevron-down" width="14"></iconify-icon>
                    </button>
                    <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Search products..." class="hidden md:block w-full bg-white/5 border border-white/10 rounded-full py-2.5 px-5 text-sm focus:outline-none focus:border-brand-accent/50 transition-all">
                </div>

                <!-- Right Side -->
                <div class="flex items-center gap-3 pl-4">
                    <button onclick="openLocationModal()" class="md:hidden p-2 bg-white/5 border border-white/10 rounded-full"><iconify-icon icon="lucide:map-pin" width="18" class="text-brand-accent"></iconify-icon></button>
                    <a id="loginBtn" href="login.html" class="hidden items-center gap-2 px-4 py-2 border border-white/20 rounded-full text-sm font-medium hover:bg-white/10 transition-colors"><iconify-icon icon="lucide:user" width="18"></iconify-icon><span class="hidden sm:inline">Login</span></a>
                    <div id="userProfile" class="hidden relative">
                        <button onclick="toggleProfileDropdown()" class="flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-full hover:border-brand-accent/50 transition-colors"><iconify-icon icon="lucide:user-check" width="18" class="text-brand-accent"></iconify-icon><span id="navUserName" class="text-sm font-medium hidden sm:inline">User</span></button>
                        <div id="profileDropdown" class="profile-dropdown"><div class="flex items-center gap-3 mb-4 pb-4 border-b border-white/10"><div class="w-12 h-12 bg-brand-accent/10 rounded-full flex items-center justify-center"><iconify-icon icon="lucide:user" width="24" class="text-brand-accent"></iconify-icon></div><div><p id="dropName" class="font-semibold">User Name</p><p class="text-xs text-neutral-500">Verified Account</p></div></div><a href="profile.html" class="w-full flex items-center gap-2 text-white py-2 rounded-lg hover:bg-white/5 transition-colors text-sm mb-2"><iconify-icon icon="lucide:settings" width="16"></iconify-icon> My Profile</a><button onclick="logoutUser()" class="w-full flex items-center justify-center gap-2 bg-red-500/10 text-red-500 py-2 rounded-lg hover:bg-red-500/20 transition-colors text-sm">Logout</button></div>
                    </div>
                </div>
            </div>
            
            <!-- Mobile Search -->
            <div class="md:hidden pb-4 flex gap-2">
                <input type="text" id="searchInputMobile" onkeyup="filterProducts()" placeholder="Search..." class="flex-1 bg-white/5 border border-white/10 rounded-full py-2 px-4 text-sm focus:outline-none">
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-28 md:pt-32 pb-24 min-h-screen">
        <div class="max-w-7xl mx-auto px-6">
            <div class="mb-8">
                <a href="index.html" class="text-neutral-500 hover:text-white transition-colors text-sm flex items-center gap-1 mb-2"><iconify-icon icon="lucide:arrow-left" width="14"></iconify-icon> Back</a>
                <h1 id="categoryTitle" class="text-3xl md:text-4xl font-semibold tracking-tight uppercase">Category</h1>
            </div>

            <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                <div class="col-span-full text-center py-12 text-neutral-400">Loading...</div>
            </div>
        </div>
    </main>

    <!-- Floating Cart Widget -->
    <div id="floatingCartWidget" class="fixed bottom-6 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-auto md:min-w-[500px] bg-brand-gray border border-white/10 rounded-2xl shadow-2xl z-40 hidden transition-all duration-300">
        <div class="flex items-center justify-between p-3 cursor-pointer" onclick="toggleWidgetItems()"><div class="flex items-center gap-3"><div class="relative"><img id="widgetImg" src="https://picsum.photos/seed/item/100/100" class="w-12 h-12 rounded-xl object-cover border border-white/10"><span id="widgetBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-brand-accent text-black text-[10px] font-bold rounded-full flex items-center justify-center">0</span></div><div class="text-left"><div class="flex items-center gap-2"><span id="widgetCount" class="font-bold text-white">0 Items</span><iconify-icon id="widgetArrow" icon="lucide:chevron-up" width="16" class="text-neutral-400 transition-transform duration-300"></iconify-icon></div><p id="widgetSavings" class="text-sm text-brand-green font-medium">₹0 saved</p></div></div><a href="cart.html" onclick="event.stopPropagation()" class="bg-brand-accent text-black px-5 py-2 rounded-xl font-semibold text-sm hover:bg-brand-yellow transition-colors flex items-center gap-2 shadow-lg shadow-brand-accent/20">Checkout <iconify-icon icon="lucide:arrow-right" width="16"></iconify-icon></a></div>
        <div id="widgetItems" class="widget-items border-t border-white/5"><div class="p-3 space-y-2 max-h-48 overflow-y-auto" id="widgetItemsList"></div></div>
    </div>

    <script>
        const API_URL = 'https://night-cart.onrender.com';
        let allProducts = []; let cart = [];
        let currentCategory = '';
        
        // Map Vars
        let locationMap; let locationMarker;
        let tempSelectedLat = null; let tempSelectedLng = null; let tempSelectedArea = "";
        let currentLabel = "Home";

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            currentCategory = params.get('cat') || 'all';
            document.getElementById('categoryTitle').textContent = currentCategory.replace('_', ' ');
            document.title = `${currentCategory.replace('_', ' ')} - Night Cart`;
            
            loadCart();
            checkLoginStatus();
            loadProducts();
            setupCursor();
            loadSavedLocation();
        });

        // --- Products Logic ---
        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/api/products`);
                const data = await res.json();
                allProducts = data;
                renderProducts();
            } catch (e) {
                document.getElementById('productsGrid').innerHTML = '<div class="col-span-full text-red-400 text-center">Error loading products</div>';
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            let filtered = allProducts;
            if (currentCategory !== 'all') {
                filtered = allProducts.filter(p => p.category.toLowerCase() === currentCategory.toLowerCase());
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-neutral-400">No products found in this category.</div>';
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card bg-brand-gray rounded-2xl overflow-hidden border border-white/5 hover:border-brand-accent/20 transition-all group">
                    <div class="relative overflow-hidden">
                        <img src="${p.image}" alt="${p.name}" class="product-image w-full aspect-square object-cover transition-transform duration-500">
                        ${p.discount > 0 ? `<div class="absolute top-3 left-3 px-2 py-1 bg-brand-accent text-black text-xs font-bold rounded">${p.discount}% OFF</div>` : ''}
                        <button onclick="addToCart(${p.id})" class="absolute bottom-3 right-3 w-10 h-10 bg-white text-black rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:scale-110 hover:bg-brand-accent shadow-lg"><iconify-icon icon="lucide:plus" width="20"></iconify-icon></button>
                    </div>
                    <div class="p-4">
                        <h3 class="font-medium text-sm mb-1 line-clamp-1">${p.name}</h3>
                        <p class="text-xs text-neutral-500 mb-2">${p.weight}</p>
                        <div class="flex items-center justify-between">
                            <span class="text-lg font-semibold">₹${p.price}</span>
                            <span class="text-sm text-neutral-500 line-through">₹${p.originalPrice}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts() {
            const d = document.getElementById('searchInput').value.toLowerCase();
            const m = document.getElementById('searchInputMobile').value.toLowerCase();
            const q = d || m;
            let filtered = allProducts;
            if (currentCategory !== 'all') filtered = allProducts.filter(p => p.category.toLowerCase() === currentCategory.toLowerCase());
            if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
            
            const grid = document.getElementById('productsGrid');
            if (filtered.length === 0) { grid.innerHTML = '<div class="col-span-full text-center py-12 text-neutral-400">No results.</div>'; return; }
            grid.innerHTML = filtered.map(p => `
                <div class="product-card bg-brand-gray rounded-2xl overflow-hidden border border-white/5 hover:border-brand-accent/20 transition-all group">
                    <div class="relative overflow-hidden"><img src="${p.image}" class="product-image w-full aspect-square object-cover transition-transform duration-500">
                        <button onclick="addToCart(${p.id})" class="absolute bottom-3 right-3 w-10 h-10 bg-white text-black rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:scale-110 hover:bg-brand-accent shadow-lg"><iconify-icon icon="lucide:plus" width="20"></iconify-icon></button>
                    </div>
                    <div class="p-4"><h3 class="font-medium text-sm mb-1 line-clamp-1">${p.name}</h3><p class="text-xs text-neutral-500 mb-2">${p.weight}</p><div class="flex items-center justify-between"><span class="text-lg font-semibold">₹${p.price}</span></div></div>
                </div>
            `).join('');
        }

        // --- Cart Logic ---
        function loadCart() { const s = localStorage.getItem('nc_cart'); if (s) cart = JSON.parse(s); updateWidget(); }
        function updateWidget() { const t = cart.reduce((s, i) => s + i.quantity, 0); const w = document.getElementById('floatingCartWidget'); if (t > 0) { w.classList.remove('hidden'); document.getElementById('widgetCount').textContent = `${t} Items`; document.getElementById('widgetSavings').textContent = `₹${cart.reduce((s, i) => s + ((i.originalPrice - i.price) * i.quantity), 0)} saved`; document.getElementById('widgetBadge').textContent = t; const l = cart[cart.length - 1]; if (l) document.getElementById('widgetImg').src = l.image; document.getElementById('widgetItemsList').innerHTML = cart.map(i => `<div class="flex items-center gap-3 p-2 bg-brand-black/50 rounded-lg"><img src="${i.image}" class="w-10 h-10 rounded object-cover"><div class="flex-1"><p class="text-xs font-medium truncate">${i.name}</p><p class="text-xs text-neutral-500">Qty: ${i.quantity}</p></div><span class="text-xs font-bold">₹${i.price * i.quantity}</span></div>`).join(''); } else { w.classList.add('hidden'); } }
        window.toggleWidgetItems = () => { const i = document.getElementById('widgetItems'); i.classList.toggle('open'); };
        window.addToCart = (id) => { const p = allProducts.find(x => x.id === id); if (!p) return; const e = cart.find(x => x.id === id); if (e) e.quantity += 1; else cart.push({ ...p, quantity: 1 }); localStorage.setItem('nc_cart', JSON.stringify(cart)); updateWidget(); showNotification("Added!"); };
        function showNotification(m) { const n = document.createElement('div'); n.className = 'fixed top-24 left-1/2 -translate-x-1/2 px-6 py-3 bg-white text-black rounded-full font-medium text-sm z-50 shadow-lg'; n.textContent = m; document.body.appendChild(n); setTimeout(() => n.remove(), 1500); }

        // --- Auth & Location (Copied from Index) ---
        function checkLoginStatus() { const i = localStorage.getItem('nc_isLoggedIn'); if (i === 'true') { document.getElementById('loginBtn').classList.add('hidden'); document.getElementById('userProfile').classList.remove('hidden'); document.getElementById('navUserName').textContent = localStorage.getItem('nc_userName') || 'User'; document.getElementById('dropName').textContent = localStorage.getItem('nc_userName') || 'User'; } else { document.getElementById('loginBtn').classList.remove('hidden'); document.getElementById('userProfile').classList.add('hidden'); } }
        function toggleProfileDropdown() { document.getElementById('profileDropdown').classList.toggle('open'); }
        function logoutUser() { localStorage.clear(); location.reload(); }
        
        function loadSavedLocation() { const t = localStorage.getItem('nc_location_text'); if (t) document.getElementById('navLocationText').textContent = t; }
        
        function openLocationModal() { document.getElementById('locationModal').classList.remove('hidden'); document.getElementById('locationModal').classList.add('flex'); setTimeout(() => { if (!locationMap) initLocationMap(); else locationMap.invalidateSize(); }, 100); }
        function closeLocationModal() { document.getElementById('locationModal').classList.add('hidden'); document.getElementById('locationModal').classList.remove('flex'); }
        
        function initLocationMap() {
            const lat = parseFloat(localStorage.getItem('nc_location_lat')) || 20.59;
            const lng = parseFloat(localStorage.getItem('nc_location_lng')) || 78.96;
            locationMap = L.map('locationMap', { center: [lat, lng], zoom: 13, zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { subdomains: 'abcd' }).addTo(locationMap);
            locationMarker = L.marker([lat, lng]).addTo(locationMap);
            tempSelectedLat = lat; tempSelectedLng = lng;
            
            locationMap.on('click', async (e) => {
                locationMarker.setLatLng(e.latlng);
                tempSelectedLat = e.latlng.lat; tempSelectedLng = e.latlng.lng;
                try { const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${tempSelectedLat}&lon=${tempSelectedLng}`); const d = await r.json(); document.getElementById('selectedAreaText').textContent = d.display_name.split(',').slice(0, 3).join(', '); tempSelectedArea = document.getElementById('selectedAreaText').textContent; } catch (err) { }
            });
        }

        async function searchLocation() { const q = document.getElementById('locationSearchInput').value; if (q.length < 3) return; const r = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&q=${q}&limit=5`); const d = await r.json(); document.getElementById('searchResults').classList.remove('hidden'); document.getElementById('searchResults').innerHTML = d.map(r => `<div onclick="selectSearch(${r.lat}, ${r.lon}, '${r.display_name.replace(/'/g, "\\'")}')" class="p-2 text-xs hover:bg-white/5 cursor-pointer">${r.display_name}</div>`).join(''); }
        function selectSearch(lat, lng, name) { document.getElementById('selectedAreaText').textContent = name.split(',').slice(0, 3).join(', '); tempSelectedArea = document.getElementById('selectedAreaText').textContent; locationMap.setView([lat, lng], 15); locationMarker.setLatLng([lat, lng]); tempSelectedLat = lat; tempSelectedLng = lng; document.getElementById('searchResults').classList.add('hidden'); }
        function setLabel(l) { currentLabel = l; document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('bg-brand-accent', 'text-black')); document.getElementById('label' + l).classList.add('bg-brand-accent', 'text-black'); }

        async function saveAndConfirmAddress() {
            const house = document.getElementById('inputHouse').value;
            // NUCLEAR FIX
            if (locationMap) { if (tempSelectedLat === null) tempSelectedLat = locationMap.getCenter().lat; if (tempSelectedLng === null) tempSelectedLng = locationMap.getCenter().lng; }
            if (!house) return alert("Enter House No.");
            
            try {
                const r = await fetch(`${API_URL}/api/check-location`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userLat: tempSelectedLat, userLng: tempSelectedLng }) }); const d = await r.json();
                const displayText = `${house}, ${tempSelectedArea || 'Selected'}`;
                localStorage.setItem('nc_location_lat', tempSelectedLat); localStorage.setItem('nc_location_lng', tempSelectedLng); localStorage.setItem('nc_location_text', displayText);
                const addressObj = { label: currentLabel, houseNo: house, building: document.getElementById('inputBuilding').value, area: tempSelectedArea };
                localStorage.setItem('nc_selected_address', JSON.stringify(addressObj));
                if (d.serviceable) { localStorage.setItem('nc_location_ok', 'true'); document.getElementById('navLocationText').textContent = displayText; closeLocationModal(); showNotification("Address Saved!"); } else { localStorage.setItem('nc_location_ok', 'false'); closeLocationModal(); alert("Not serviceable"); }
            } catch (e) { alert("Error"); }
        }

        function setupCursor() { const d = document.getElementById('cursor-dot'), r = document.getElementById('cursor-ring'); document.addEventListener('mousemove', e => { d.style.left = e.clientX - 4 + 'px'; d.style.top = e.clientY - 4 + 'px'; r.style.left = e.clientX - 20 + 'px'; r.style.top = e.clientY - 20 + 'px'; }); }
    </script>
</body>
</html>
