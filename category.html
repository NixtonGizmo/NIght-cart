<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category - Night Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class', // Enable class-based dark mode
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            black: '#0f172a', dark: '#020617', gray: '#1e293b', light: '#64748b',
                            yellow: '#FFD700', green: '#22C55E', accent: '#6366f1' // Modern Indigo
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { cursor: none; }
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: #f1f5f9; } 
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-track { background: #0f172a; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        
        ::selection { background: #6366f1; color: white; }
        
        /* Cursor Styles */
        #cursor-dot { width: 8px; height: 8px; background: #6366f1; position: fixed; pointer-events: none; z-index: 99999; border-radius: 50%; transition: background 0.2s; }
        #cursor-ring { width: 40px; height: 40px; border: 1px solid rgba(99, 102, 241, 0.3); position: fixed; pointer-events: none; z-index: 9998; border-radius: 50%; transition: width 0.2s; }
        #cursor-ring.hover { width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); border-color: #6366f1; }

        /* Dark Mode Cursor Fix */
        .dark #cursor-dot { background: white; mix-blend-mode: difference; }
        .dark #cursor-ring { border-color: rgba(255,255,255,0.3); }
        
        .product-card:hover .product-image { transform: scale(1.05); }
        
        .profile-dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 10px; border-radius: 16px; padding: 16px; width: 250px; z-index: 100; }
        .profile-dropdown.open { display: block; }

        /* Map Overrides */
        #locationMap { height: 200px; width: 100%; z-index: 10; border-radius: 12px; }
        .leaflet-control-zoom { display: none; }
    </style>
</head>
<body class="font-sans antialiased bg-slate-50 text-slate-900 dark:bg-brand-dark dark:text-slate-200 transition-colors duration-300">
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- LOCATION MODAL -->
    <div id="locationModal" class="fixed inset-0 z-[200] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="bg-white dark:bg-brand-gray rounded-3xl w-full max-w-2xl border border-slate-200 dark:border-white/10 shadow-2xl overflow-hidden max-h-[95vh] flex flex-col">
            <div class="p-6 border-b border-slate-100 dark:border-white/5 flex items-center justify-between flex-shrink-0">
                <h3 class="font-semibold text-lg text-slate-800 dark:text-white">Save Delivery Address</h3>
                <button onclick="closeLocationModal()" class="text-slate-400 hover:text-slate-800 dark:hover:text-white"><iconify-icon icon="lucide:x" width="24"></iconify-icon></button>
            </div>
            <div class="flex-1 overflow-y-auto">
                <div class="p-4 bg-slate-50 dark:bg-brand-black/50 relative z-20">
                    <input type="text" id="locationSearchInput" onkeyup="searchLocation()" placeholder="Search area..." class="w-full bg-white dark:bg-brand-gray border border-slate-200 dark:border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none text-slate-800 dark:text-white">
                    <div id="searchResults" class="mt-2 space-y-1 max-h-24 overflow-y-auto hidden absolute left-4 right-4 bg-white dark:bg-brand-gray rounded-lg p-2 border border-slate-200 dark:border-white/10 shadow-lg"></div>
                </div>
                <div id="locationMap" class="w-full flex-shrink-0 bg-slate-200 dark:bg-brand-black"></div>
                <div class="p-6 space-y-4">
                    <div class="flex items-center gap-2 mb-2"><iconify-icon icon="lucide:navigation" width="16" class="text-brand-accent"></iconify-icon><span id="selectedAreaText" class="text-sm font-medium text-brand-accent">Select on Map</span></div>
                    <div class="grid grid-cols-3 gap-3">
                         <button onclick="setLabel('Home')" id="labelHome" class="label-btn border border-slate-200 dark:border-white/10 py-2 rounded-lg text-xs font-medium hover:border-brand-accent transition-colors text-slate-600 dark:text-slate-400">Home</button>
                         <button onclick="setLabel('Work')" id="labelWork" class="label-btn border border-slate-200 dark:border-white/10 py-2 rounded-lg text-xs font-medium hover:border-brand-accent transition-colors text-slate-600 dark:text-slate-400">Work</button>
                         <button onclick="setLabel('Other')" id="labelOther" class="label-btn border border-slate-200 dark:border-white/10 py-2 rounded-lg text-xs font-medium hover:border-brand-accent transition-colors text-slate-600 dark:text-slate-400">Other</button>
                    </div>
                    <div>
                        <label class="text-xs text-slate-500 block mb-1">House / Flat No.</label>
                        <input type="text" id="inputHouse" placeholder="e.g. 404, A Wing" class="w-full bg-slate-50 dark:bg-brand-dark border border-slate-200 dark:border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none text-slate-800 dark:text-white">
                    </div>
                    <div>
                        <label class="text-xs text-slate-500 block mb-1">Building / Society Name</label>
                        <input type="text" id="inputBuilding" placeholder="e.g. Sunflower Apartments" class="w-full bg-slate-50 dark:bg-brand-dark border border-slate-200 dark:border-white/10 rounded-lg py-2 px-3 text-sm focus:outline-none text-slate-800 dark:text-white">
                    </div>
                </div>
            </div>
            <div class="p-4 border-t border-slate-100 dark:border-white/5 bg-slate-50 dark:bg-brand-dark flex-shrink-0">
                <button onclick="saveAndConfirmAddress()" class="w-full bg-brand-accent text-white font-semibold py-3 rounded-xl hover:bg-indigo-600 transition-colors text-sm">Save Address & Confirm</button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-30 bg-white/90 dark:bg-brand-dark/90 backdrop-blur-xl border-b border-slate-200 dark:border-white/5">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a href="index.html" class="flex items-center group hover:opacity-80 transition-opacity pr-4">
                    <svg width="140" height="50" viewBox="0 0 300 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M35 5 A25 25 0 1 1 35 55 A20 20 0 1 0 35 5" fill="#0f172a" class="dark:fill-white"/>
                        <g transform="translate(12, 18) scale(0.8)" fill="#6366f1">
                            <path d="M0 0 L4 0 L6 12 L30 12 L28 4 L8 4 L8 2 L30 2 L34 16 L4 16 L0 0 Z" />
                            <circle cx="10" cy="22" r="4" /><circle cx="26" cy="22" r="4" />
                        </g>
                        <text x="85" y="60" font-family="'Inter', sans-serif" font-weight="700" font-size="32"><tspan fill="#0f172a" class="dark:fill-white">Night</tspan><tspan fill="#6366f1">cart</tspan></text>
                    </svg>
                </a>

                <!-- Center Group: Location + Search -->
                <div class="flex-1 flex items-center justify-center gap-3">
                    <button onclick="openLocationModal()" class="hidden md:flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-full hover:border-brand-accent/50 transition-colors flex-shrink-0">
                        <iconify-icon icon="lucide:map-pin" width="16" class="text-brand-accent"></iconify-icon>
                        <span id="navLocationText" class="text-sm font-medium truncate max-w-[80px] lg:max-w-[150px] text-slate-700 dark:text-slate-300">Select</span>
                        <iconify-icon icon="lucide:chevron-down" width="14" class="text-slate-400"></iconify-icon>
                    </button>

                    <!-- Search Input -->
                    <div class="hidden md:flex items-center w-full max-w-md bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-full py-2 px-4 focus-within:border-brand-accent/50 transition-all">
                        <iconify-icon icon="lucide:search" width="16" class="text-slate-400 mr-2"></iconify-icon>
                        <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Search products..." class="w-full bg-transparent text-sm focus:outline-none text-slate-800 dark:text-slate-200 placeholder-slate-400">
                    </div>
                </div>

                <!-- Right Side -->
                <div class="flex items-center gap-3 pl-4">
                    <!-- Theme Toggle -->
                    <button onclick="toggleTheme()" id="themeToggle" class="p-2 rounded-full bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">
                        <iconify-icon icon="lucide:sun" width="18" class="text-yellow-500" id="sunIcon"></iconify-icon>
                        <iconify-icon icon="lucide:moon" width="18" class="text-slate-600 hidden" id="moonIcon"></iconify-icon>
                    </button>

                    <button onclick="openLocationModal()" class="md:hidden p-2 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-full"><iconify-icon icon="lucide:map-pin" width="18" class="text-brand-accent"></iconify-icon></button>

                    <a id="loginBtn" href="login.html" class="hidden items-center gap-2 px-4 py-2 border border-slate-200 dark:border-white/20 rounded-full text-sm font-medium hover:bg-slate-100 dark:hover:bg-white/10 transition-colors text-slate-700 dark:text-slate-200">
                        <iconify-icon icon="lucide:user" width="18"></iconify-icon>
                        <span class="hidden sm:inline">Login</span>
                    </a>
                    
                    <div id="userProfile" class="hidden relative">
                        <button onclick="toggleProfileDropdown()" class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-full hover:border-brand-accent/50 transition-colors">
                            <iconify-icon icon="lucide:user-check" width="18" class="text-brand-accent"></iconify-icon>
                            <span id="navUserName" class="text-sm font-medium hidden sm:inline text-slate-700 dark:text-slate-200">User</span>
                        </button>
                        <div id="profileDropdown" class="profile-dropdown bg-white dark:bg-brand-gray border-slate-200 dark:border-white/10">
                            <div class="flex items-center gap-3 mb-4 pb-4 border-b border-slate-100 dark:border-white/10">
                                <div class="w-12 h-12 bg-indigo-50 dark:bg-brand-accent/10 rounded-full flex items-center justify-center"><iconify-icon icon="lucide:user" width="24" class="text-brand-accent"></iconify-icon></div>
                                <div><p id="dropName" class="font-semibold text-slate-800 dark:text-white">User Name</p><p class="text-xs text-slate-500">Verified Account</p></div>
                            </div>
                            <a href="profile.html" class="w-full flex items-center gap-2 text-slate-700 dark:text-white py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-white/5 transition-colors text-sm mb-2"><iconify-icon icon="lucide:settings" width="16"></iconify-icon> My Profile</a>
                            <button onclick="logoutUser()" class="w-full flex items-center justify-center gap-2 bg-red-50 dark:bg-red-500/10 text-red-500 py-2 rounded-lg hover:bg-red-100 dark:hover:bg-red-500/20 transition-colors text-sm">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Mobile Search -->
            <div class="md:hidden pb-4 flex gap-2">
                <div class="flex-1 flex items-center bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-full py-2 px-4">
                    <iconify-icon icon="lucide:search" width="16" class="text-slate-400 mr-2"></iconify-icon>
                    <input type="text" id="searchInputMobile" onkeyup="filterProducts()" placeholder="Search..." class="flex-1 bg-transparent text-sm focus:outline-none text-slate-800 dark:text-slate-200">
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-28 md:pt-32 pb-24 min-h-screen">
        <div class="max-w-7xl mx-auto px-6">
            <div class="mb-8">
                <a href="index.html" class="text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors text-sm flex items-center gap-1 mb-2"><iconify-icon icon="lucide:arrow-left" width="14"></iconify-icon> Back</a>
                <h1 id="categoryTitle" class="text-3xl md:text-4xl font-semibold tracking-tight uppercase text-slate-900 dark:text-white">Category</h1>
            </div>

            <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                <div class="col-span-full text-center py-12 text-slate-400">Loading...</div>
            </div>
        </div>
    </main>

    <!-- Floating Cart Widget -->
    <div id="floatingCartWidget" class="fixed bottom-6 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-auto md:min-w-[500px] bg-white dark:bg-brand-gray border border-slate-200 dark:border-white/10 rounded-2xl shadow-2xl z-40 hidden transition-all duration-300" style="bottom: 90px;">
        <div class="flex items-center justify-between p-3 cursor-pointer" onclick="toggleWidgetItems()">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <img id="widgetImg" src="https://picsum.photos/seed/item/100/100" class="w-12 h-12 rounded-xl object-cover border border-slate-100 dark:border-white/10">
                    <span id="widgetBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-brand-accent text-white text-[10px] font-bold rounded-full flex items-center justify-center">0</span>
                </div>
                <div class="text-left">
                    <div class="flex items-center gap-2">
                        <span id="widgetCount" class="font-bold text-slate-800 dark:text-white">0 Items</span>
                        <iconify-icon id="widgetArrow" icon="lucide:chevron-up" width="16" class="text-slate-400 transition-transform duration-300"></iconify-icon>
                    </div>
                    <p id="widgetSavings" class="text-sm text-brand-green font-medium">₹0 saved</p>
                </div>
            </div>
            <a href="cart.html" onclick="event.stopPropagation()" class="bg-brand-accent text-white px-5 py-2 rounded-xl font-semibold text-sm hover:bg-indigo-600 transition-colors flex items-center gap-2 shadow-lg">
                Checkout <iconify-icon icon="lucide:arrow-right" width="16"></iconify-icon>
            </a>
        </div>
        <div id="widgetItems" class="widget-items border-t border-slate-100 dark:border-white/5">
            <div class="p-3 space-y-2 max-h-48 overflow-y-auto bg-slate-50 dark:bg-brand-black/50" id="widgetItemsList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://night-cart.onrender.com';
        let allProducts = []; let cart = [];
        let currentCategory = '';
        
        // Map Vars
        let locationMap; let locationMarker;
        let tempSelectedLat = null; let tempSelectedLng = null; let tempSelectedArea = "";
        let currentLabel = "Home";

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            currentCategory = params.get('cat') || 'all';
            document.getElementById('categoryTitle').textContent = currentCategory.replace('_', ' ');
            document.title = `${currentCategory.replace('_', ' ')} - Night Cart`;
            
            loadCart();
            checkLoginStatus();
            loadProducts();
            setupCursor();
            loadSavedLocation();
            loadTheme();
        });

        // --- THEME LOGIC ---
        function loadTheme() {
            if (localStorage.getItem('nc_theme') === 'dark' || (!('nc_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('sunIcon').classList.add('hidden');
                document.getElementById('moonIcon').classList.remove('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('sunIcon').classList.remove('hidden');
                document.getElementById('moonIcon').classList.add('hidden');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('nc_theme', 'light');
                document.getElementById('sunIcon').classList.remove('hidden');
                document.getElementById('moonIcon').classList.add('hidden');
            } else {
                html.classList.add('dark');
                localStorage.setItem('nc_theme', 'dark');
                document.getElementById('sunIcon').classList.add('hidden');
                document.getElementById('moonIcon').classList.remove('hidden');
            }
        }

        // --- Products Logic ---
        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/api/products`);
                const data = await res.json();
                allProducts = data;
                renderProducts();
            } catch (e) {
                document.getElementById('productsGrid').innerHTML = '<div class="col-span-full text-red-500 text-center">Error loading products</div>';
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            let filtered = allProducts;
            if (currentCategory !== 'all') {
                filtered = allProducts.filter(p => p.category.toLowerCase() === currentCategory.toLowerCase());
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-slate-400">No products found.</div>';
                return;
            }

            grid.innerHTML = filtered.map(product => {
                const cartItem = cart.find(item => item.id === product.id);
                const quantity = cartItem ? cartItem.quantity : 0;
                return `
                <div class="product-card bg-white dark:bg-brand-gray rounded-2xl overflow-hidden border border-slate-100 dark:border-white/5 hover:border-brand-accent/30 transition-all group cursor-pointer shadow-sm hover:shadow-md">
                    <div class="relative overflow-hidden">
                        <img src="${product.image}" alt="${product.name}" class="product-image w-full aspect-square object-cover transition-transform duration-500">
                        ${product.discount > 0 ? `<div class="absolute top-3 left-3 px-2 py-1 bg-brand-accent text-white text-xs font-bold rounded">${product.discount}% OFF</div>` : ''}
                    </div>
                    <div class="p-3">
                        <p class="text-xs text-slate-400 uppercase tracking-wide mb-0.5">${product.category}</p>
                        <h3 class="font-medium text-sm mb-0.5 line-clamp-1 text-slate-800 dark:text-slate-200">${product.name}</h3>
                        <p class="text-[10px] text-slate-400 mb-2">${product.weight}</p>
                        
                        <!-- Price and Dynamic Button Row -->
                        <div class="flex items-center justify-between mt-1">
                            <div>
                                <span class="text-sm font-bold text-slate-900 dark:text-white">₹${product.price}</span>
                                <span class="text-[10px] text-slate-400 line-through ml-1">₹${product.originalPrice}</span>
                            </div>
                            
                            ${quantity > 0 ? `
                                <!-- Quantity Selector (Visible if in cart) -->
                                <div onclick="event.stopPropagation()" class="flex items-center bg-slate-100 dark:bg-slate-700 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-600">
                                    <button onclick="updateInlineQty(${product.id}, -1)" class="px-3 py-1.5 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 font-bold text-sm">-</button>
                                    <span class="px-3 py-1.5 font-bold text-slate-800 dark:text-white text-sm w-8 text-center">${quantity}</span>
                                    <button onclick="updateInlineQty(${product.id}, 1)" class="px-3 py-1.5 text-brand-accent hover:bg-slate-200 dark:hover:bg-slate-600 font-bold text-sm">+</button>
                                </div>
                            ` : `
                                <!-- ADD Button (Visible if NOT in cart) -->
                                <button onclick="event.stopPropagation(); addToCart(${product.id})" class="bg-brand-accent text-white font-bold text-[10px] px-4 py-2 rounded-lg hover:bg-indigo-600 transition-colors">
                                    ADD
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // New function to handle inline quantity updates
        function updateInlineQty(productId, change) {
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex > -1) {
                cart[itemIndex].quantity += change;
                if (cart[itemIndex].quantity <= 0) {
                    cart.splice(itemIndex, 1);
                }
                saveCart();
                updateWidget();
                renderProducts(); // Re-render to update button state
            }
        }

        function filterProducts() {
            const d = document.getElementById('searchInput').value.toLowerCase();
            const m = document.getElementById('searchInputMobile').value.toLowerCase();
            const q = d || m;
            let filtered = allProducts;
            if (currentCategory !== 'all') filtered = allProducts.filter(p => p.category.toLowerCase() === currentCategory.toLowerCase());
            if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
            renderProducts(); // Re-use render logic which handles empty state
        }

        // --- Cart Logic ---
        function loadCart() { const s = localStorage.getItem('nc_cart'); if (s) cart = JSON.parse(s); updateWidget(); }
        function updateWidget() { 
            const t = cart.reduce((s, i) => s + i.quantity, 0); 
            const w = document.getElementById('floatingCartWidget'); 
            if (t > 0) { 
                w.classList.remove('hidden'); 
                document.getElementById('widgetCount').textContent = `${t} Items`; 
                document.getElementById('widgetSavings').textContent = `₹${cart.reduce((s, i) => s + ((i.originalPrice - i.price) * i.quantity), 0)} saved`; 
                document.getElementById('widgetBadge').textContent = t; 
                const l = cart[cart.length - 1]; if (l) document.getElementById('widgetImg').src = l.image; 
                document.getElementById('widgetItemsList').innerHTML = cart.map(i => `<div class="flex items-center gap-3 p-2 bg-white dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700"><img src="${i.image}" class="w-10 h-10 rounded object-cover"><div class="flex-1"><p class="text-xs font-medium truncate text-slate-800 dark:text-white">${i.name}</p><p class="text-xs text-slate-400">Qty: ${i.quantity}</p></div><span class="text-xs font-bold text-slate-800 dark:text-white">₹${i.price * i.quantity}</span></div>`).join(''); 
            } else { w.classList.add('hidden'); } 
        }
        window.toggleWidgetItems = () => { const i = document.getElementById('widgetItems'); i.classList.toggle('open'); };
        
        // Updated addToCart to re-render grid
        window.addToCart = (id) => { 
            const p = allProducts.find(x => x.id === id); 
            if (!p) return; 
            const e = cart.find(x => x.id === id); 
            if (e) e.quantity += 1; else cart.push({ ...p, quantity: 1 }); 
            saveCart(); 
            updateWidget(); 
            renderProducts(); // Re-render to show quantity selector
            showNotification("Added!"); 
        };
        
        function saveCart() { localStorage.setItem('nc_cart', JSON.stringify(cart)); }
        function showNotification(m) { const n = document.createElement('div'); n.className = 'fixed top-24 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 dark:bg-brand-accent text-white rounded-full font-medium text-sm z-50 shadow-lg'; n.textContent = m; document.body.appendChild(n); setTimeout(() => n.remove(), 1500); }

        // --- Auth & Location (Copied from Index) ---
        function checkLoginStatus() { const i = localStorage.getItem('nc_isLoggedIn'); if (i === 'true') { document.getElementById('loginBtn').classList.add('hidden'); document.getElementById('userProfile').classList.remove('hidden'); document.getElementById('navUserName').textContent = localStorage.getItem('nc_userName') || 'User'; document.getElementById('dropName').textContent = localStorage.getItem('nc_userName') || 'User'; } else { document.getElementById('loginBtn').classList.remove('hidden'); document.getElementById('userProfile').classList.add('hidden'); } }
        function toggleProfileDropdown() { document.getElementById('profileDropdown').classList.toggle('open'); }
        function logoutUser() { localStorage.clear(); location.reload(); }
        
        function loadSavedLocation() { const t = localStorage.getItem('nc_location_text'); if (t) document.getElementById('navLocationText').textContent = t; }
        
        function openLocationModal() { document.getElementById('locationModal').classList.remove('hidden'); document.getElementById('locationModal').classList.add('flex'); setTimeout(() => { if (!locationMap) initLocationMap(); else locationMap.invalidateSize(); }, 100); }
        function closeLocationModal() { document.getElementById('locationModal').classList.add('hidden'); document.getElementById('locationModal').classList.remove('flex'); }
        
        function initLocationMap() {
            const lat = parseFloat(localStorage.getItem('nc_location_lat')) || 20.59;
            const lng = parseFloat(localStorage.getItem('nc_location_lng')) || 78.96;
            locationMap = L.map('locationMap', { center: [lat, lng], zoom: 13, zoomControl: false });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(locationMap);
            locationMarker = L.marker([lat, lng]).addTo(locationMap);
            tempSelectedLat = lat; tempSelectedLng = lng;
            
            locationMap.on('click', async (e) => {
                locationMarker.setLatLng(e.latlng);
                tempSelectedLat = e.latlng.lat; tempSelectedLng = e.latlng.lng;
                try { const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${tempSelectedLat}&lon=${tempSelectedLng}`); const d = await r.json(); document.getElementById('selectedAreaText').textContent = d.display_name.split(',').slice(0, 3).join(', '); tempSelectedArea = document.getElementById('selectedAreaText').textContent; } catch (err) { }
            });
        }

        async function searchLocation() { const q = document.getElementById('locationSearchInput').value; if (q.length < 3) return; const r = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&q=${q}&limit=5`); const d = await r.json(); document.getElementById('searchResults').classList.remove('hidden'); document.getElementById('searchResults').innerHTML = d.map(r => `<div onclick="selectSearch(${r.lat}, ${r.lon}, '${r.display_name.replace(/'/g, "\\'")}')" class="p-2 text-xs hover:bg-indigo-50 dark:hover:bg-white/5 cursor-pointer border-b border-slate-100 dark:border-slate-700">${r.display_name}</div>`).join(''); }
        function selectSearch(lat, lng, name) { document.getElementById('selectedAreaText').textContent = name.split(',').slice(0, 3).join(', '); tempSelectedArea = document.getElementById('selectedAreaText').textContent; locationMap.setView([lat, lng], 15); locationMarker.setLatLng([lat, lng]); tempSelectedLat = lat; tempSelectedLng = lng; document.getElementById('searchResults').classList.add('hidden'); }
        function setLabel(l) { currentLabel = l; document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('bg-brand-accent', 'text-white', 'border-brand-accent')); document.getElementById('label' + l).classList.add('bg-brand-accent', 'text-white', 'border-brand-accent'); }

        async function saveAndConfirmAddress() {
            const house = document.getElementById('inputHouse').value;
            if (locationMap) { if (tempSelectedLat === null) tempSelectedLat = locationMap.getCenter().lat; if (tempSelectedLng === null) tempSelectedLng = locationMap.getCenter().lng; }
            if (!house) return alert("Enter House No.");
            
            try {
                const r = await fetch(`${API_URL}/api/check-location`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userLat: tempSelectedLat, userLng: tempSelectedLng }) }); const d = await r.json();
                const displayText = `${house}, ${tempSelectedArea || 'Selected'}`;
                localStorage.setItem('nc_location_lat', tempSelectedLat); localStorage.setItem('nc_location_lng', tempSelectedLng); localStorage.setItem('nc_location_text', displayText);
                const addressObj = { label: currentLabel, houseNo: house, building: document.getElementById('inputBuilding').value, area: tempSelectedArea };
                localStorage.setItem('nc_selected_address', JSON.stringify(addressObj));
                if (d.serviceable) { localStorage.setItem('nc_location_ok', 'true'); document.getElementById('navLocationText').textContent = displayText; closeLocationModal(); showNotification("Address Saved!"); } else { localStorage.setItem('nc_location_ok', 'false'); closeLocationModal(); alert("Not serviceable"); }
            } catch (e) { alert("Error"); }
        }

        function setupCursor() { const d = document.getElementById('cursor-dot'), r = document.getElementById('cursor-ring'); document.addEventListener('mousemove', e => { d.style.left = e.clientX - 4 + 'px'; d.style.top = e.clientY - 4 + 'px'; r.style.left = e.clientX - 20 + 'px'; r.style.top = e.clientY - 20 + 'px'; }); }
    </script>
</body>
</html>
