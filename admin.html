    <!-- Add Product Modal (Keep existing modal code here, just updating script below) -->
    <!-- ... (Your existing Modal HTML code remains here) ... -->
    
    <!-- IMPORTANT: Copy your existing Modal HTML code here if you replaced the whole file previously -->
    <!-- For brevity, I will assume the modal is still there. If you lost it, copy the modal from the previous 'admin.html' I gave you. -->

    <script>
        const API_URL = 'https://night-cart.onrender.com';

        document.addEventListener('DOMContentLoaded', () => {
            setupCursor();
            checkAdminAuth();
        });

        function setupCursor() {
            const cursorDot = document.getElementById('cursor-dot');
            const cursorRing = document.getElementById('cursor-ring');
            document.addEventListener('mousemove', (e) => {
                cursorDot.style.left = e.clientX - 4 + 'px'; cursorDot.style.top = e.clientY - 4 + 'px';
                cursorRing.style.left = e.clientX - 20 + 'px'; cursorRing.style.top = e.clientY - 20 + 'px';
            });
        }

        function checkAdminAuth() {
            const isAuth = sessionStorage.getItem('nc_admin_auth');
            if (isAuth === 'true') { showDashboard(); } else { showLogin(); }
        }

        async function attemptAdminLogin(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            try {
                const res = await fetch(`${API_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(data.success) {
                    sessionStorage.setItem('nc_admin_auth', 'true');
                    showDashboard();
                } else { document.getElementById('loginError').classList.remove('hidden'); }
            } catch (err) { alert("Server connection error"); }
        }

        function showLogin() {
            document.getElementById('adminLoginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('adminLoginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            loadUsers();
            loadProducts();
            loadOrders(); // Load orders
        }
        
        function logoutAdmin() {
            sessionStorage.removeItem('nc_admin_auth');
            location.reload();
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(sectionId).classList.remove('hidden');
            document.querySelectorAll('.sidebar-link').forEach(el => {
                el.classList.remove('active');
                if(el.dataset.section === sectionId) el.classList.add('active');
            });
            document.getElementById('pageTitle').textContent = sectionId.charAt(0).toUpperCase() + sectionId.slice(1);
        }

        // --- USERS ---
        async function loadUsers() {
            const tbody = document.getElementById('usersTableBody');
            try {
                const res = await fetch(`${API_URL}/api/users`);
                const users = await res.json();
                tbody.innerHTML = users.map(u => `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                        <td class="px-6 py-4 font-medium">${u.name || 'N/A'}</td>
                        <td class="px-6 py-4">${u.phone}</td>
                        <td class="px-6 py-4">${u.dob || 'N/A'}</td>
                        <td class="px-6 py-4 capitalize">${u.gender || 'N/A'}</td>
                    </tr>
                `).join('');
            } catch (err) { tbody.innerHTML = '<tr><td colspan="4" class="text-center p-8 text-red-500">Error</td></tr>'; }
        }

        // --- PRODUCTS ---
        async function loadProducts() {
            const tbody = document.getElementById('productsTableBody');
            try {
                const res = await fetch(`${API_URL}/api/products`);
                const products = await res.json();
                document.getElementById('dashProducts').textContent = products.length;
                tbody.innerHTML = products.map(p => `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                        <td class="px-6 py-4"><img src="${p.image}" class="w-10 h-10 rounded-lg object-cover"></td>
                        <td class="px-6 py-4 font-medium">${p.name}</td>
                        <td class="px-6 py-4 text-neutral-400 capitalize">${p.category}</td>
                        <td class="px-6 py-4">₹${p.price}</td>
                        <td class="px-6 py-4">
                            <button onclick="deleteProduct(${p.id})" class="p-2 hover:bg-red-500/10 rounded-lg"><iconify-icon icon="lucide:trash-2" width="16" class="text-red-500"></iconify-icon></button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }

        function openModal() { document.getElementById('productModal').classList.remove('hidden'); document.getElementById('productModal').classList.add('modal-open'); }
        function closeModal() { document.getElementById('productModal').classList.add('hidden'); document.getElementById('productModal').classList.remove('modal-open'); }
        function generateRandomImage() { document.getElementById('newProdImage').value = `https://picsum.photos/seed/${Math.random().toString(36).substring(7)}/300/300`; }

        async function saveProduct() {
            const price = Number(document.getElementById('newProdPrice').value);
            const originalPrice = Number(document.getElementById('newProdOriginalPrice').value);
            const product = {
                id: Date.now(),
                name: document.getElementById('newProdName').value,
                category: document.getElementById('newProdCat').value,
                weight: document.getElementById('newProdWeight').value,
                price: price,
                originalPrice: originalPrice,
                image: document.getElementById('newProdImage').value || `https://picsum.photos/seed/${Date.now()}/300/300`,
                discount: originalPrice > price ? Math.round(((originalPrice - price) / originalPrice) * 100) : 0
            };

            try {
                const res = await fetch(`${API_URL}/api/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
                const data = await res.json();
                if(data.success) { closeModal(); loadProducts(); } else { alert("Failed to save product"); }
            } catch (err) { alert("Error saving product"); }
        }

        async function deleteProduct(id) {
            if(confirm("Delete this product?")) {
                await fetch(`${API_URL}/api/products/${id}`, { method: 'DELETE' });
                loadProducts();
            }
        }

        // --- NEW: ORDERS ---
        async function loadOrders() {
            try {
                const res = await fetch(`${API_URL}/api/orders`);
                const orders = await res.json();
                
                const pending = orders.filter(o => o.status === 'pending');
                const delivered = orders.filter(o => o.status === 'delivered');

                // Update Counts
                document.getElementById('pendingCount').textContent = pending.length;
                document.getElementById('deliveredCount').textContent = delivered.length;

                // Render Pending
                const pendingList = document.getElementById('pendingOrdersList');
                if(pending.length > 0) {
                    pendingList.innerHTML = pending.map(o => `
                        <div class="bg-brand-black/50 p-4 rounded-xl border border-white/5">
                            <div class="flex justify-between items-center mb-3">
                                <div>
                                    <p class="font-mono text-xs text-neutral-500">${o.orderId}</p>
                                    <p class="font-semibold">${o.userName}</p>
                                    <p class="text-xs text-neutral-400">${o.userPhone}</p>
                                </div>
                                <p class="text-lg font-bold text-white">₹${o.totalAmount}</p>
                            </div>
                            <div class="text-xs text-neutral-500 mb-3">${o.items.length} items • ${new Date(o.createdAt).toLocaleTimeString()}</div>
                            <button onclick="markDelivered('${o._id}')" class="w-full bg-green-500/10 text-green-500 py-2 rounded-lg text-sm font-medium hover:bg-green-500/20 transition-colors">
                                Mark as Delivered
                            </button>
                        </div>
                    `).join('');
                } else {
                    pendingList.innerHTML = '<p class="text-center text-neutral-500 text-sm py-8">No pending orders</p>';
                }

                // Render Delivered
                const deliveredList = document.getElementById('deliveredOrdersList');
                if(delivered.length > 0) {
                    deliveredList.innerHTML = delivered.map(o => `
                        <div class="bg-brand-black/50 p-4 rounded-xl border border-white/5 opacity-70">
                            <div class="flex justify-between items-center">
                                <div>
                                    <p class="font-mono text-xs text-neutral-500">${o.orderId}</p>
                                    <p class="font-semibold">${o.userName}</p>
                                </div>
                                <p class="font-bold">₹${o.totalAmount}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    deliveredList.innerHTML = '<p class="text-center text-neutral-500 text-sm py-8">No delivered orders</p>';
                }

            } catch (err) { console.error("Error loading orders", err); }
        }

        async function markDelivered(id) {
            try {
                await fetch(`${API_URL}/api/orders/${id}/deliver`, { method: 'PUT' });
                loadOrders(); // Refresh list
            } catch (err) { alert("Error updating order"); }
        }
    </script>
