<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Cart - Grocery Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            black: '#050505', dark: '#0a0a0a', gray: '#171717', light: '#e5e5e5',
                            yellow: '#FFD700', green: '#22C55E', accent: '#8CFF00'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { cursor: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
        ::selection { background: white; color: black; }
        
        .product-card:hover .product-image { transform: scale(1.05); }
        .category-card:hover { transform: translateY(-5px); }
        
        #cursor-dot { width: 8px; height: 8px; background: white; position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; mix-blend-mode: difference; }
        #cursor-ring { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.5); position: fixed; pointer-events: none; z-index: 9998; border-radius: 50%; transition: width 0.2s; }
        #cursor-ring.hover { width: 60px; height: 60px; background: rgba(255,255,255,0.1); }
        
        .cart-sidebar { transform: translateX(100%); transition: transform 0.3s ease-out; }
        .cart-sidebar.open { transform: translateX(0); }
        .overlay { opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .overlay.open { opacity: 1; visibility: visible; }
        
        .profile-dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 10px; background: #171717; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; width: 250px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .profile-dropdown.open { display: block; }
    </style>
</head>
<body class="bg-brand-black text-white font-sans antialiased">
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <div class="fixed inset-0 bg-grain pointer-events-none z-50"></div>
    <div id="overlay" class="overlay fixed inset-0 bg-black/60 backdrop-blur-sm z-40" onclick="toggleCart()"></div>
    
    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-sidebar fixed top-0 right-0 h-full w-full md:w-[400px] bg-brand-dark border-l border-white/10 z-50 flex flex-col">
        <div class="p-6 border-b border-white/10 flex items-center justify-between">
            <h2 class="text-xl font-semibold">Your Cart</h2>
            <button onclick="toggleCart()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors">
                <iconify-icon icon="lucide:x" width="20"></iconify-icon>
            </button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-6"><div class="text-center text-neutral-400 py-12"><p>Your cart is empty</p></div></div>
        <div id="cartFooter" class="p-6 border-t border-white/10 hidden">
            <div class="flex justify-between mb-4"><span class="text-neutral-400">Subtotal</span><span id="cartSubtotal" class="font-semibold">₹0</span></div>
            <button class="w-full bg-brand-accent text-black font-semibold py-4 rounded-full hover:bg-brand-yellow transition-colors">Checkout • <span id="cartTotal">₹0</span></button>
        </div>
    </div>
    
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-30 bg-brand-black/90 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a href="index.html" class="flex items-center gap-2 group">
                    <div class="w-8 h-8 bg-brand-accent rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                        <iconify-icon icon="lucide:zap" width="18" class="text-black"></iconify-icon>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Night Cart</span>
                </a>
                <div class="hidden md:flex flex-1 max-w-md mx-8">
                    <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Search products..." class="w-full bg-white/5 border border-white/10 rounded-full py-3 px-6 text-sm focus:outline-none focus:border-brand-accent/50 transition-all">
                </div>
                
                <!-- Auth Section -->
                <div class="flex items-center gap-3">
                    <a id="loginBtn" href="login.html" class="hidden items-center gap-2 px-4 py-2 border border-white/20 rounded-full text-sm font-medium hover:bg-white/10 transition-colors">
                        <iconify-icon icon="lucide:user" width="18"></iconify-icon>
                        <span class="hidden sm:inline">Login</span>
                    </a>
                    
                    <div id="userProfile" class="hidden relative">
                        <button onclick="toggleProfileDropdown()" class="flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-full hover:border-brand-accent/50 transition-colors">
                            <iconify-icon icon="lucide:user-check" width="18" class="text-brand-accent"></iconify-icon>
                            <span id="navUserName" class="text-sm font-medium hidden sm:inline">User</span>
                        </button>
                        <div id="profileDropdown" class="profile-dropdown">
                            <div class="flex items-center gap-3 mb-4 pb-4 border-b border-white/10">
                                <div class="w-12 h-12 bg-brand-accent/10 rounded-full flex items-center justify-center">
                                    <iconify-icon icon="lucide:user" width="24" class="text-brand-accent"></iconify-icon>
                                </div>
                                <div><p id="dropName" class="font-semibold">User Name</p><p class="text-xs text-neutral-500">Verified Account</p></div>
                            </div>
                            <div class="space-y-3 text-sm">
                                <div class="flex justify-between text-neutral-400"><span>DOB:</span><span id="dropDob" class="text-white">Not Set</span></div>
                                <div class="flex justify-between text-neutral-400"><span>Gender:</span><span id="dropGender" class="text-white capitalize">Not Set</span></div>
                            </div>
                            <button onclick="logoutUser()" class="w-full mt-4 flex items-center justify-center gap-2 bg-red-500/10 text-red-500 py-2 rounded-lg hover:bg-red-500/20 transition-colors">Logout</button>
                        </div>
                    </div>

                    <button onclick="toggleCart()" class="relative flex items-center gap-2 px-4 py-2 bg-white text-black rounded-full font-medium text-sm hover:bg-neutral-200 transition-colors">
                        <iconify-icon icon="lucide:shopping-cart" width="16"></iconify-icon>
                        <span class="hidden sm:inline">Cart</span>
                        <span id="cartCount" class="absolute -top-1 -right-1 w-5 h-5 bg-brand-accent text-black text-xs font-bold rounded-full flex items-center justify-center hidden">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT STARTS HERE (No Hero) -->
    <main class="pt-24">
        
        <!-- Categories Section -->
        <section class="py-16 md:py-20">
            <div class="max-w-7xl mx-auto px-6">
                <h2 class="text-3xl md:text-4xl font-semibold tracking-tight mb-10">Shop by Category</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-3xl mx-auto">
                    
                    <!-- Fruits Link -->
                    <a href="category.html?cat=fruits" class="category-card bg-brand-gray rounded-2xl p-6 border border-white/5 hover:border-brand-accent/30 transition-all cursor-pointer group text-center block">
                        <div class="w-12 h-12 bg-orange-500/10 rounded-xl flex items-center justify-center mb-3 mx-auto group-hover:scale-110 transition-transform">
                            <iconify-icon icon="lucide:apple" width="24" class="text-orange-500"></iconify-icon>
                        </div>
                        <h3 class="font-medium text-sm">Fruits</h3>
                    </a>
                    
                    <!-- Snacks Link -->
                    <a href="category.html?cat=snacks" class="category-card bg-brand-gray rounded-2xl p-6 border border-white/5 hover:border-brand-accent/30 transition-all cursor-pointer group text-center block">
                        <div class="w-12 h-12 bg-yellow-500/10 rounded-xl flex items-center justify-center mb-3 mx-auto group-hover:scale-110 transition-transform">
                            <iconify-icon icon="lucide:popcorn" width="24" class="text-yellow-500"></iconify-icon>
                        </div>
                        <h3 class="font-medium text-sm">Snacks</h3>
                    </a>
                    
                    <!-- Beverages Link -->
                    <a href="category.html?cat=beverages" class="category-card bg-brand-gray rounded-2xl p-6 border border-white/5 hover:border-brand-accent/30 transition-all cursor-pointer group text-center block">
                        <div class="w-12 h-12 bg-purple-500/10 rounded-xl flex items-center justify-center mb-3 mx-auto group-hover:scale-110 transition-transform">
                            <iconify-icon icon="lucide:wine" width="24" class="text-purple-500"></iconify-icon>
                        </div>
                        <h3 class="font-medium text-sm">Beverages</h3>
                    </a>
                    
                </div>
            </div>
        </section>
        
        <!-- Products Section -->
        <section class="py-16 md:py-20 bg-brand-dark">
            <div class="max-w-7xl mx-auto px-6">
                <div class="flex items-center justify-between mb-10">
                    <div><h2 class="text-3xl md:text-4xl font-semibold tracking-tight" id="sectionTitle">All Products</h2></div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 md:gap-6" id="productsGrid">
                    <div class="col-span-full text-center py-12 text-neutral-400">Loading products...</div>
                </div>
            </div>
        </section>

    </main>
    
    <footer class="py-16 border-t border-white/5">
        <div class="max-w-7xl mx-auto px-6 text-center text-neutral-500 text-sm"><p>© 2024 Night Cart. All rights reserved.</p></div>
    </footer>

    <script>
        const API_URL = 'https://night-cart.onrender.com';
        let allProducts = []; 
        let cart = [];

        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            loadProductsFromDB();
            setupCursor();
        });

        // --- 1. DATABASE CONNECTION ---
        async function loadProductsFromDB() {
            try {
                const response = await fetch(`${API_URL}/api/products`);
                allProducts = await response.json(); 
                renderProducts(allProducts);
            } catch (error) {
                document.getElementById('productsGrid').innerHTML = '<p class="col-span-full text-center text-red-500">Failed to load products.</p>';
            }
        }

        // --- 2. RENDER LOGIC ---
        function renderProducts(productsToRender) {
            const grid = document.getElementById('productsGrid');
            
            if (!productsToRender || productsToRender.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-neutral-400">No products found.</div>';
                return;
            }

            grid.innerHTML = productsToRender.map(product => `
                <div class="product-card bg-brand-gray rounded-2xl overflow-hidden border border-white/5 hover:border-brand-accent/20 transition-all group">
                    <div class="relative overflow-hidden">
                        <img src="${product.image}" alt="${product.name}" class="product-image w-full aspect-square object-cover transition-transform duration-500">
                        ${product.discount > 0 ? `<div class="absolute top-3 left-3 px-2 py-1 bg-brand-accent text-black text-xs font-bold rounded">${product.discount}% OFF</div>` : ''}
                        <button onclick="addToCart(${product.id})" class="absolute bottom-3 right-3 w-10 h-10 bg-white text-black rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:scale-110 hover:bg-brand-accent">
                            <iconify-icon icon="lucide:plus" width="20"></iconify-icon>
                        </button>
                    </div>
                    <div class="p-4">
                        <p class="text-xs text-neutral-500 uppercase tracking-wide mb-1">${product.category}</p>
                        <h3 class="font-medium text-sm mb-1 line-clamp-1">${product.name}</h3>
                        <p class="text-xs text-neutral-500 mb-3">${product.weight}</p>
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="text-lg font-semibold">₹${product.price}</span>
                                <span class="text-sm text-neutral-500 line-through ml-2">₹${product.originalPrice}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- 3. FILTER LOGIC ---
        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(searchTerm));
            renderProducts(filtered);
        }

        // --- 4. CART LOGIC ---
        window.addToCart = (productId) => {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) { existingItem.quantity += 1; } else { cart.push({ ...product, quantity: 1 }); }
            updateCart();
            showNotification(`${product.name} added to cart!`);
        };

        window.toggleCart = () => {
            document.getElementById('cartSidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        };

        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartSubtotal = document.getElementById('cartSubtotal');
            const cartTotal = document.getElementById('cartTotal');
            const cartFooter = document.getElementById('cartFooter');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            if (totalItems > 0) {
                cartCount.textContent = totalItems; cartCount.classList.remove('hidden'); cartFooter.classList.remove('hidden');
                cartItems.innerHTML = cart.map(item => `
                    <div class="flex gap-4 mb-4 pb-4 border-b border-white/5">
                        <img src="${item.image}" alt="${item.name}" class="w-20 h-20 rounded-lg object-cover">
                        <div class="flex-1">
                            <h4 class="font-medium text-sm">${item.name}</h4>
                            <p class="text-xs text-neutral-500">${item.weight}</p>
                            <p class="font-semibold mt-1">₹${item.price}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                cartCount.classList.add('hidden'); cartFooter.classList.add('hidden');
                cartItems.innerHTML = `<div class="text-center text-neutral-400 py-12"><p>Your cart is empty</p></div>`;
            }
            cartSubtotal.textContent = `₹${subtotal}`; cartTotal.textContent = `₹${subtotal}`;
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 bg-white text-black rounded-full font-medium text-sm z-50';
            notification.textContent = message; document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }

        // --- 5. AUTH LOGIC ---
        function checkLoginStatus() {
            const isLoggedIn = localStorage.getItem('nc_isLoggedIn');
            const userName = localStorage.getItem('nc_userName') || 'User';
            if (isLoggedIn === 'true') {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('navUserName').textContent = userName;
                document.getElementById('dropName').textContent = userName;
                document.getElementById('dropDob').textContent = localStorage.getItem('nc_userDob') || 'Not Set';
                document.getElementById('dropGender').textContent = localStorage.getItem('nc_userGender') || 'Not Set';
            } else {
                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('userProfile').classList.add('hidden');
            }
        }
        
        function toggleProfileDropdown() { document.getElementById('profileDropdown').classList.toggle('open'); }
        function logoutUser() { localStorage.clear(); location.reload(); }

        // --- 6. CURSOR LOGIC ---
        function setupCursor() {
            const cursorDot = document.getElementById('cursor-dot');
            const cursorRing = document.getElementById('cursor-ring');
            document.addEventListener('mousemove', (e) => {
                cursorDot.style.left = e.clientX - 4 + 'px'; cursorDot.style.top = e.clientY - 4 + 'px';
                cursorRing.style.left = e.clientX - 20 + 'px'; cursorRing.style.top = e.clientY - 20 + 'px';
            });
        }
    </script>
</body>
</html>
