<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Night Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { black: '#050505', dark: '#0a0a0a', gray: '#171717', light: '#e5e5e5', yellow: '#FFD700', green: '#22C55E', accent: '#8CFF00' } } } } }
    </script>
    <style>
        * { cursor: none; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0a0a0a; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::selection { background: white; color: black; }
        #cursor-dot { width: 8px; height: 8px; background: white; position: fixed; pointer-events: none; z-index: 99999; border-radius: 50%; mix-blend-mode: difference; }
        #cursor-ring { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.5); position: fixed; pointer-events: none; z-index: 9998; border-radius: 50%; transition: width 0.2s; }
    </style>
</head>
<body class="bg-brand-black text-white font-sans antialiased">
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Nav -->
    <nav class="fixed top-0 left-0 right-0 z-30 bg-brand-black/90 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
                    <path d="M35 5 A25 25 0 1 1 35 55 A20 20 0 1 0 35 5" fill="white"/>
                    <g transform="translate(12, 18) scale(0.8)" fill="#8CFF00">
                        <path d="M0 0 L4 0 L6 12 L30 12 L28 4 L8 4 L8 2 L30 2 L34 16 L4 16 L0 0 Z" />
                        <circle cx="10" cy="22" r="4" /><circle cx="26" cy="22" r="4" />
                    </g>
                </svg>
                <span class="font-bold text-lg">Checkout</span>
            </a>
        </div>
    </nav>

    <!-- Main -->
    <main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Your Cart</h1>
        
        <!-- Items List -->
        <div id="cartItems" class="space-y-4 mb-8">
            <p class="text-neutral-500 text-center py-10">Loading...</p>
        </div>

        <!-- Address Section -->
        <div class="bg-brand-gray rounded-2xl p-5 border border-white/5 mb-6">
            <div class="flex justify-between items-start mb-2">
                <h3 class="font-semibold text-sm text-neutral-400 uppercase tracking-wide">Deliver To</h3>
                <a href="index.html" class="text-brand-accent text-xs font-medium">Change</a>
            </div>
            <div id="checkoutAddress">
                <p class="font-medium">No address selected</p>
                <p class="text-xs text-neutral-500">Please go back and select a location.</p>
            </div>
        </div>

        <!-- Payment Summary -->
        <div class="bg-brand-gray rounded-2xl p-5 border border-white/5 mb-6">
            <div class="flex justify-between text-sm mb-2"><span class="text-neutral-400">Subtotal</span><span id="subtotal">₹0</span></div>
            <div class="flex justify-between text-sm mb-2"><span class="text-neutral-400">Delivery</span><span>FREE</span></div>
            <div class="border-t border-white/10 my-3 pt-3 flex justify-between font-bold text-lg"><span>Total</span><span id="grandTotal">₹0</span></div>
        </div>

        <!-- Place Order Button -->
        <button onclick="placeOrder()" id="placeOrderBtn" class="w-full bg-brand-accent text-black font-bold py-4 rounded-full text-center hover:bg-brand-yellow transition-colors text-sm disabled:opacity-50 disabled:cursor-not-allowed">
            Place Order
        </button>
    </main>

    <script>
        const API_URL = 'https://night-cart.onrender.com';
        let cart = [];

        document.addEventListener('DOMContentLoaded', () => {
            setupCursor();
            loadCartData();
            loadAddressData();
        });

        function loadCartData() {
            const savedCart = localStorage.getItem('nc_cart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
            }
            renderCartItems();
            updateTotals();
        }

        function loadAddressData() {
            const text = localStorage.getItem('nc_location_text') || 'Select Address';
            const addressObj = JSON.parse(localStorage.getItem('nc_selected_address') || '{}');
            const lat = localStorage.getItem('nc_location_lat');
            const lng = localStorage.getItem('nc_location_lng');

            const container = document.getElementById('checkoutAddress');
            
            // Debug: Log to console to verify data is present
            console.log("Checkout Data Check:", { text, addressObj, lat, lng });
            
            // Display formatted address
            let html = '';
            if (addressObj.houseNo) {
                html += `<p class="font-medium">${addressObj.houseNo}, ${addressObj.building || ''}</p>`;
            }
            html += `<p class="text-sm text-neutral-400">${text}</p>`;
            
            // Show warning if coords missing
            if (!lat || !lng) {
                html += `<p class="text-red-500 text-xs mt-2 font-medium">Warning: Exact location missing. Please set map pin on home page.</p>`;
                document.getElementById('placeOrderBtn').disabled = true;
            }
            
            container.innerHTML = html;
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-neutral-500 text-center py-10">Your cart is empty.</p>';
                document.getElementById('placeOrderBtn').disabled = true;
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="flex items-center gap-4 bg-brand-gray rounded-xl p-3 border border-white/5">
                    <img src="${item.image}" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-1">
                        <p class="font-medium text-sm">${item.name}</p>
                        <p class="text-xs text-neutral-500">${item.weight}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-semibold">₹${item.price * item.quantity}</p>
                        <p class="text-xs text-neutral-500">x${item.quantity}</p>
                    </div>
                </div>
            `).join('');
        }

        function updateTotals() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('subtotal').textContent = `₹${total}`;
            document.getElementById('grandTotal').textContent = `₹${total}`;
        }

        async function placeOrder() {
            const btn = document.getElementById('placeOrderBtn');
            const phone = localStorage.getItem('nc_userPhone');
            const userName = localStorage.getItem('nc_userName') || 'Guest';
            
            // Get Address Data from LocalStorage
            const lat = parseFloat(localStorage.getItem('nc_location_lat'));
            const lng = parseFloat(localStorage.getItem('nc_location_lng'));
            const addressText = localStorage.getItem('nc_location_text');
            const addressObj = JSON.parse(localStorage.getItem('nc_selected_address') || '{}');

            if (!phone) {
                alert("Please login first.");
                window.location.href = 'login.html';
                return;
            }
            if (!lat || !lng) {
                alert("Please set your delivery location on the map.");
                return;
            }
            if (cart.length === 0) {
                alert("Cart is empty.");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Placing Order...";

            // Construct Order Payload
            const orderData = {
                userPhone: phone,
                userName: userName,
                items: cart,
                totalAmount: cart.reduce((sum, i) => sum + (i.price * i.quantity), 0),
                
                // --- THE FIX: MULTIPLE DELIVERY STRATEGIES ---
                
                // Strategy 1: Root Level Fields (Most likely to be saved if schema is loose)
                lat: lat,
                lng: lng,
                deliveryArea: addressText,

                // Strategy 2: Nested Address Object (For structured schemas)
                userAddress: {
                    houseNo: addressObj.houseNo || '',
                    building: addressObj.building || '',
                    area: addressObj.area || addressText,
                    lat: lat,
                    lng: lng
                },
                // Strategy 3: Flat address fields (Legacy support)
                "userAddress.lat": lat,
                "userAddress.lng": lng
            };

            console.log("Sending Order Data:", orderData);

            try {
                const res = await fetch(`${API_URL}/api/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if (res.ok) {
                    localStorage.removeItem('nc_cart'); // Clear cart
                    alert("Order placed successfully!");
                    window.location.href = 'index.html'; // Redirect home
                } else {
                    const err = await res.json();
                    alert("Error: " + (err.message || "Could not place order"));
                    btn.disabled = false;
                    btn.textContent = "Place Order";
                }
            } catch (e) {
                console.error(e);
                alert("Server error. Try again.");
                btn.disabled = false;
                btn.textContent = "Place Order";
            }
        }

        function setupCursor() { 
            const d=document.getElementById('cursor-dot'), r=document.getElementById('cursor-ring'); 
            document.addEventListener('mousemove',e=>{d.style.left=e.clientX-4+'px';d.style.top=e.clientY-4+'px';r.style.left=e.clientX-20+'px';r.style.top=e.clientY-20+'px';});
        }
    </script>
</body>
</html>
