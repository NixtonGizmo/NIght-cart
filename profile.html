<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Night Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script> tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { black: '#050505', dark: '#0a0a0a', gray: '#171717', accent: '#8CFF00' } } } } } </script>
    <style>
        * { cursor: none; } #cursor-dot { width: 8px; height: 8px; background: white; position: fixed; pointer-events: none; z-index: 99999; border-radius: 50%; mix-blend-mode: difference; } #cursor-ring { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.8); position: fixed; pointer-events: none; z-index: 99998; border-radius: 50%; transition: width 0.15s; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0a0a0a; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .address-input { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 12px; font-size: 14px; width: 100%; color: white; outline: none; }
        #locationMap { height: 200px; width: 100%; background: #fff; z-index: 10; border-radius: 12px; }
        .leaflet-control-zoom { display: none; }
    </style>
</head>
<body class="bg-brand-black text-white font-sans antialiased">
    <div id="cursor-dot"></div><div id="cursor-ring"></div>

    <!-- Map Modal -->
    <div id="locationModal" class="fixed inset-0 z-[200] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="bg-brand-gray rounded-3xl w-full max-w-2xl border border-white/10 shadow-2xl overflow-hidden max-h-[95vh] flex flex-col">
            <div class="p-6 border-b border-white/5 flex items-center justify-between flex-shrink-0"><h3 class="font-semibold text-lg" id="modalTitle">Add New Address</h3><button onclick="closeLocationModal()" class="text-neutral-400 hover:text-white"><iconify-icon icon="lucide:x" width="24"></iconify-icon></button></div>
            <div class="flex-1 overflow-y-auto">
                <div class="p-4 bg-brand-black/50 relative z-20"><input type="text" id="locationSearchInput" onkeyup="searchLocation()" placeholder="Search area..." class="w-full bg-brand-gray border border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none"><div id="searchResults" class="mt-2 space-y-1 max-h-24 overflow-y-auto hidden absolute left-4 right-4 bg-brand-gray rounded-lg p-2 border border-white/10"></div></div>
                <div id="locationMap" class="w-full flex-shrink-0"></div>
                <div class="p-6 space-y-4">
                    <div class="flex items-center gap-2 mb-2"><iconify-icon icon="lucide:navigation" width="16" class="text-brand-accent"></iconify-icon><span id="selectedAreaText" class="text-sm font-medium text-brand-accent">Move map to select</span></div>
                    <div class="grid grid-cols-3 gap-3"><button onclick="setLabel('Home')" id="labelHome" class="label-btn border border-white/10 py-2 rounded-lg text-xs font-medium hover:border-brand-accent transition-colors">Home</button><button onclick="setLabel('Work')" id="labelWork" class="label-btn border border-white/10 py-2 rounded-lg text-xs font-medium hover:border-brand-accent transition-colors">Work</button><button onclick="setLabel('Other')" id="labelOther" class="label-btn border border-white/10 py-2 rounded-lg text-xs font-medium hover:border-brand-accent transition-colors">Other</button></div>
                    <div><label class="text-xs text-neutral-500 block mb-1">House / Flat No.</label><input type="text" id="inputHouse" placeholder="House/Flat No." class="address-input"></div>
                    <div><label class="text-xs text-neutral-500 block mb-1">Sector / Building</label><input type="text" id="inputBuilding" placeholder="Building Name" class="address-input"></div>
                </div>
            </div>
            <div class="p-4 border-t border-white/5 bg-brand-dark flex-shrink-0"><button onclick="saveAddress()" class="w-full bg-brand-accent text-black font-semibold py-3 rounded-xl hover:bg-brand-yellow transition-colors text-sm">Save Address</button></div>
        </div>
    </div>

    <!-- Nav -->
    <nav class="fixed top-0 left-0 right-0 z-30 bg-brand-black/90 backdrop-blur-xl border-b border-white/5"><div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between"><a href="index.html" class="font-bold text-lg">Night Cart</a><button onclick="localStorage.clear();location.href='index.html'" class="text-xs text-red-500 hover:underline">Logout</button></div></nav>

    <!-- Main -->
    <main class="pt-28 pb-16 px-6 max-w-6xl mx-auto">
        <div class="bg-brand-gray rounded-2xl p-6 border border-white/5 mb-6"><div class="flex items-center gap-4 mb-4"><div class="w-12 h-12 bg-brand-accent/10 rounded-full flex items-center justify-center"><iconify-icon icon="lucide:user" width="24" class="text-brand-accent"></iconify-icon></div><div><h2 class="font-semibold" id="userName">User</h2><p class="text-sm text-neutral-400" id="userPhone">+91...</p></div></div></div>
        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-brand-gray rounded-2xl p-6 border border-white/5"><h3 class="font-semibold mb-4 flex items-center gap-2"><iconify-icon icon="lucide:receipt" width="18" class="text-brand-accent"></iconify-icon> Order History</h3><div id="orderHistoryList" class="space-y-2 max-h-[300px] overflow-y-auto"></div></div>
            <div class="bg-brand-gray rounded-2xl p-6 border border-white/5"><div class="flex justify-between items-center mb-4"><h3 class="font-semibold">Saved Addresses</h3><button onclick="openLocationModal()" class="text-xs text-brand-accent">+ Add</button></div><div id="addressList" class="space-y-2 max-h-[300px] overflow-y-auto"></div></div>
        </div>
    </main>

    <script>
        const API_URL = 'https://night-cart.onrender.com';
        let locationMap, locationMarker, tempSelectedLat, tempSelectedLng, tempSelectedArea, currentLabel="Home", editId;
        document.addEventListener('DOMContentLoaded', () => { checkAuth(); setupCursor(); });
        function checkAuth() { if(localStorage.getItem('nc_isLoggedIn')!=='true') location.href='login.html'; document.getElementById('userName').textContent = localStorage.getItem('nc_userName'); document.getElementById('userPhone').textContent = localStorage.getItem('nc_userPhone'); loadOrders(); loadAddresses(); }
        async function loadOrders() { const r = await fetch(`${API_URL}/api/orders/user/${localStorage.getItem('nc_userPhone')}`); const d = await r.json(); document.getElementById('orderHistoryList').innerHTML = d.length ? d.map(o => `<div class="p-3 bg-black/30 rounded-lg text-xs"><div class="flex justify-between"><span class="font-mono text-neutral-500">${o.orderId}</span><span class="text-brand-accent capitalize">${o.status}</span></div><p class="my-1">${o.items.map(i=>i.name).join(', ')}</p><div class="flex justify-between border-t border-white/5 pt-1 mt-1"><span class="text-neutral-500">${new Date(o.createdAt).toLocaleDateString()}</span><span>₹${o.totalAmount}</span></div></div>`).join('') : '<p class="text-neutral-500 text-sm text-center">No orders</p>'; }
        async function loadAddresses() { const r = await fetch(`${API_URL}/api/addresses/${localStorage.getItem('nc_userPhone')}`); const d = await r.json(); document.getElementById('addressList').innerHTML = d.length ? d.map(a => `<div class="p-10px; }
        function initMap() { 
            const lat = parseFloat(localStorage.getItem('nc_location_lat'))||20.59; 
            const lng = parseFloat(localStorage.getItem('nc_location_lng'))||78.96; 
            locationMap = L.map('locationMap', {center:[lat,lng], zoom:13, zoomControl:false}); 
            
            // --- REPLACED WITH OSM LIGHT MAP (CartoDB Positron) ---
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {subdomains:'abcd'}).addTo(locationMap); 
            
            locationMarker = L.marker([lat,lng]).addTo(locationMap); 
            tempSelectedLat=lat; tempSelectedLng=lng; 
            
            locationMap.on('click', async e => { 
                locationMarker.setLatLng(e.latlng); 
                tempSelectedLat=e.latlng.lat; tempSelectedLng=e.latlng.lng; 
                try{ const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${tempSelectedLat}&lon=${tempSelectedLng}`); const d = await r.json(); document.getElementById('selectedAreaText').textContent = d.display_name.split(',').slice(0,3).join(', '); tempSelectedArea = document.getElementById('selectedAreaText').textContent; }catch(e){} 
            }); 
        }
        async function searchLocation() { const q = document.getElementById('locationSearchInput').value; if(q.length<3) return; const r = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&q=${q}&limit=5`); const d = await r.json(); document.getElementById('searchResults').classList.remove('hidden'); document.getElementById('searchResults').innerHTML = d.map(r=>`<div onclick="selectSearch(${r.lat},${r.lon},'${r.display_name}')" class="p-2 text-xs hover:bg-white/5 cursor-pointer">${r.display_name}</div>`).join(''); }
        function selectSearch(lat,lng,name) { document.getElementById('selectedAreaText').textContent = name.split(',').slice(0,3).join(', '); tempSelectedArea = document.getElementById('selectedAreaText').textContent; locationMap.setView([lat,lng],15); locationMarker.setLatLng([lat,lng]); tempSelectedLat=lat; tempSelectedLng=lng; document.getElementById('searchResults').classList.add('hidden'); }
        function setLabel(l) { currentLabel=l; document.querySelectorAll('.label-btn').forEach(b=>b.classList.remove('bg-brand-accent','text-black')); document.getElementById('label'+l).classList.add('bg-brand-accent','text-black'); }
        async function saveAddress() {
            // NUCLEAR FIX
            if(locationMap){ if(tempSelectedLat===null) tempSelectedLat = locationMap.getCenter().lat; if(tempSelectedLng===null) tempSelectedLng = locationMap.getCenter().lng; }
            if(!document.getElementById('inputHouse').value || !tempSelectedLat) return alert("Fill details");
            const body = { phone:localStorage.getItem('nc_userPhone'), label:currentLabel, houseNo:document.getElementById('inputHouse').value, building:document.getElementById('inputBuilding').value, area:tempSelectedArea, lat:tempSelectedLat, lng:tempSelectedLng };
            const url = editId ? `${API_URL}/api/addresses/${editId}` : `${API_URL}/api/addresses`;
            await fetch(url, { method: editId?'PUT':'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
            closeLocationModal(); loadAddresses(); alert("Saved");
        }
        function setupCursor() { const d=document.getElementById('cursor-dot'), r=document.getElementById('cursor-ring'); document.addEventListener('mousemove', e => { d.style.left=e.clientX-4+'px'; d.style.top=e.clientY-4+'px'; r.style.left=e.clientX-20+'px'; r.style.top=e.clientY-20+'px'; }); }
    </script>
</body>
</html>
