<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - Night Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <!-- LEAFLET CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] }, 
                    colors: { 
                        brand: { black: '#050505', dark: '#0a0a0a', gray: '#171717', accent: '#8CFF00', yellow: '#FFD700' } 
                    } 
                } 
            } 
        }
    </script>
    <style>
        * { cursor: none; }
        body { background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 100%); }
        
        ::-webkit-scrollbar { width: 4px; } 
        ::-webkit-scrollbar-track { background: transparent; } 
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        
        ::selection { background: #8CFF00; color: black; }
        
        /* Custom Cursor */
        #cursor-dot { width: 8px; height: 8px; background: white; position: fixed; pointer-events: none; z-index: 99999; border-radius: 50%; mix-blend-mode: difference; transition: transform 0.1s; }
        #cursor-ring { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.3); position: fixed; pointer-events: none; z-index: 99998; border-radius: 50%; transition: width 0.2s, height 0.2s, background 0.2s; }
        #cursor-ring.hover { width: 60px; height: 60px; background: rgba(140, 255, 0, 0.1); border-color: #8CFF00; }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3);
        }

        /* Glowing Button */
        .btn-glow {
            background: #8CFF00;
            color: black;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(140, 255, 0, 0.2);
            transition: all 0.2s ease;
        }
        .btn-glow:hover {
            background: white;
            box-shadow: 0 0 25px rgba(140, 255, 0, 0.4);
        }

        /* Active Tab */
        .tab-btn.active {
            background: rgba(140, 255, 0, 0.1);
            color: #8CFF00;
            border-color: rgba(140, 255, 0, 0.3);
            box-shadow: 0 0 15px rgba(140, 255, 0, 0.1);
        }

        /* Status Badges */
        .badge-yellow { background: rgba(250, 204, 21, 0.1); color: #FACC15; border: 1px solid rgba(250, 204, 21, 0.2); }
        .badge-green { background: rgba(34, 197, 94, 0.1); color: #22C55E; border: 1px solid rgba(34, 197, 94, 0.2); }
        .badge-blue { background: rgba(59, 130, 246, 0.1); color: #3B82F6; border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge-red { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.2); }

        /* Map Styling */
        #modalMap { width: 100%; height: 300px; background: #050505; border-radius: 16px; z-index: 10; }
        .leaflet-control-attribution { background: rgba(0,0,0,0.5) !important; color: #444 !important; }

        /* Animations */
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-brand-black text-white font-sans antialiased text-sm">
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- STAFF LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-gradient-to-br from-brand-black via-brand-dark to-brand-black"></div>
        <div class="glass-card rounded-3xl w-full max-w-sm p-8 text-center relative z-10 border border-white/10">
            <div class="w-16 h-16 bg-brand-accent/10 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-brand-accent/20">
                <iconify-icon icon="lucide:shield-check" width="32" class="text-brand-accent"></iconify-icon>
            </div>
            <h1 class="text-2xl font-bold mb-1 tracking-tight">Staff Portal</h1>
            <p class="text-neutral-500 text-xs mb-8">Access restricted to authorized personnel</p>
            
            <form onsubmit="staffLogin(event)" class="space-y-4">
                <input type="tel" id="staffPhone" placeholder="Phone Number" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brand-accent/50 focus:bg-white/10 transition-all">
                <input type="password" id="staffPass" placeholder="Password" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brand-accent/50 focus:bg-white/10 transition-all">
                <button type="submit" class="w-full btn-glow py-3 rounded-full text-sm font-bold tracking-wide">AUTHENTICATE</button>
            </form>
            <p id="loginError" class="text-red-400 text-xs mt-4 hidden">Invalid credentials</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboardScreen" class="hidden">
        <!-- Top Nav -->
        <nav class="fixed top-0 left-0 right-0 z-30 border-b border-white/5 bg-brand-black/80 backdrop-blur-xl">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-brand-accent/10 rounded-lg flex items-center justify-center border border-brand-accent/20">
                        <iconify-icon icon="lucide:layout-dashboard" width="16" class="text-brand-accent"></iconify-icon>
                    </div>
                    <h1 class="font-bold tracking-tight">Dashboard</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-xs text-neutral-500">Logged in as</p>
                        <p id="staffName" class="text-xs font-medium text-brand-accent"></p>
                    </div>
                    <button onclick="staffLogout()" class="p-2 rounded-full bg-white/5 hover:bg-red-500/20 hover:text-red-500 transition-colors border border-white/10">
                        <iconify-icon icon="lucide:log-out" width="16"></iconify-icon>
                    </button>
                </div>
            </div>
            
            <!-- Tabs -->
            <div class="max-w-7xl mx-auto px-6 pb-4 flex gap-2 overflow-x-auto no-scrollbar">
                <button onclick="switchTab('new')" id="tab-new" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full border border-white/5 text-xs font-medium transition-all flex items-center gap-2">
                    <iconify-icon icon="lucide:bell" width="14"></iconify-icon> New <span id="count-new" class="opacity-50">(0)</span>
                </button>
                <button onclick="switchTab('picking')" id="tab-picking" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full border border-white/5 text-xs font-medium transition-all flex items-center gap-2">
                    <iconify-icon icon="lucide:package" width="14"></iconify-icon> Picking <span id="count-picking" class="opacity-50">(0)</span>
                </button>
                <button onclick="switchTab('ready')" id="tab-ready" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full border border-white/5 text-xs font-medium transition-all flex items-center gap-2">
                    <iconify-icon icon="lucide:check-circle" width="14"></iconify-icon> Ready <span id="count-ready" class="opacity-50">(0)</span>
                </button>
                <button onclick="switchTab('delivery')" id="tab-delivery" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full border border-white/5 text-xs font-medium transition-all flex items-center gap-2">
                    <iconify-icon icon="lucide:truck" width="14"></iconify-icon> Delivery <span id="count-delivery" class="opacity-50">(0)</span>
                </button>
            </div>
        </nav>

        <!-- Content -->
        <main class="pt-36 pb-8 px-6 max-w-7xl mx-auto">
            <div id="list-new" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5 hidden"></div>
            <div id="list-picking" class="grid md:grid-cols-2 gap-5 hidden"></div>
            <div id="list-ready" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5 hidden"></div>
            <div id="list-delivery" class="grid md:grid-cols-1 lg:grid-cols-2 gap-5 hidden"></div>
        </main>
    </div>

    <!-- MAP MODAL -->
    <div id="mapModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="glass-card rounded-3xl w-full max-w-lg border border-white/10 overflow-hidden flex flex-col max-h-[90vh] shadow-2xl animate-fade-in">
            <div class="p-5 flex justify-between items-center border-b border-white/5">
                <div>
                    <h3 class="font-bold text-sm">Delivery Location</h3>
                    <p class="text-neutral-500 text-xs">Check pin accuracy</p>
                </div>
                <button onclick="closeMapModal()" class="text-neutral-400 hover:text-white p-2 hover:bg-white/5 rounded-full transition-colors"><iconify-icon icon="lucide:x" width="18"></iconify-icon></button>
            </div>
            
            <div id="modalMap"></div>
            
            <div class="p-5 bg-brand-dark/50 text-sm space-y-4">
                <div>
                    <p class="text-neutral-500 text-xs mb-1">Address</p>
                    <p class="font-medium text-white leading-relaxed" id="mapAddressText">...</p>
                    <p class="text-neutral-400 text-xs mt-1 font-mono" id="mapCoordsText">0.0, 0.0</p>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <a id="mapCallBtn" href="tel:" class="col-span-1 text-center bg-green-500/10 hover:bg-green-500/20 text-green-500 px-4 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 transition-colors">
                        <iconify-icon icon="lucide:phone" width="16"></iconify-icon> Call
                    </a>
                    <a id="mapNavBtn" href="#" target="_blank" class="col-span-1 text-center bg-blue-500/10 hover:bg-blue-500/20 text-blue-500 px-4 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 transition-colors">
                        <iconify-icon icon="lucide:navigation" width="16"></iconify-icon> Navigate
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- DEBUG MODAL -->
    <div id="debugModal" class="fixed inset-0 z-[200] hidden items-center justify-center p-4 bg-black/95" onclick="this.classList.add('hidden')">
        <div class="glass-card rounded-xl w-full max-w-md p-5 border border-white/10 overflow-auto max-h-[80vh] text-xs" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-sm text-red-400">Debug Mode: Raw Data</h3>
                <button onclick="document.getElementById('debugModal').classList.add('hidden')" class="text-neutral-400 hover:text-white text-lg">&times;</button>
            </div>
            <pre id="debugContent" class="whitespace-pre-wrap text-neutral-300 bg-black/50 p-3 rounded-lg border border-white/5"></pre>
        </div>
    </div>

    <script>
        const API_URL = 'https://night-cart.onrender.com';
        let orders = [];
        let currentTab = 'new';
        let locationMap = null;
        let locationMarker = null;

        document.addEventListener('DOMContentLoaded', () => {
            setupCursor();
            if (localStorage.getItem('nc_staff_auth') === 'true') {
                showDashboard();
            }
        });

        // --- AUTH ---
        async function staffLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('staffPhone').value;
            const pass = document.getElementById('staffPass').value;

            try {
                const res = await fetch(`${API_URL}/api/staff/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('nc_staff_auth', 'true');
                    localStorage.setItem('nc_staff_phone', phone);
                    showDashboard();
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            } catch(e) {
                document.getElementById('loginError').textContent = "Server error";
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function staffLogout() {
            localStorage.removeItem('nc_staff_auth');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('staffName').textContent = localStorage.getItem('nc_staff_phone');
            loadData();
            setInterval(loadData, 10000);
        }

        // --- DATA LOGIC ---
        async function loadData() {
            try {
                const res = await fetch(`${API_URL}/api/staff/orders`);
                orders = await res.json();
                renderLists();
            } catch(e) {
                console.error("Failed to load orders");
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('[id^="list-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`list-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        function renderLists() {
            const newOrders = orders.filter(o => o.status === 'pending');
            const pickingOrders = orders.filter(o => o.status === 'picking');
            const readyOrders = orders.filter(o => o.status === 'ready');
            const deliveryOrders = orders.filter(o => o.status === 'out_for_delivery');

            document.getElementById('count-new').textContent = `(${newOrders.length})`;
            document.getElementById('count-picking').textContent = `(${pickingOrders.length})`;
            document.getElementById('count-ready').textContent = `(${readyOrders.length})`;
            document.getElementById('count-delivery').textContent = `(${deliveryOrders.length})`;

            document.getElementById('list-new').innerHTML = newOrders.map(o => orderCard(o, 'Accept & Pick')).join('') || emptyState("No new orders");
            document.getElementById('list-picking').innerHTML = pickingOrders.map(o => pickingCard(o)).join('') || emptyState("No items being picked");
            document.getElementById('list-ready').innerHTML = readyOrders.map(o => orderCard(o, 'Start Delivery')).join('') || emptyState("No orders ready");
            document.getElementById('list-delivery').innerHTML = deliveryOrders.map(o => deliveryCard(o)).join('') || emptyState("No active deliveries");
        }

        function orderCard(o, btnText) {
            return `
            <div class="glass-card rounded-2xl p-5 flex flex-col gap-4">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="font-mono text-[10px] text-neutral-500 uppercase tracking-widest">${o.orderId}</p>
                        <p class="font-semibold text-lg mt-1">${o.userName}</p>
                    </div>
                    <span class="text-xl font-bold text-brand-accent">₹${o.totalAmount}</span>
                </div>
                <div class="bg-black/20 rounded-xl p-3 border border-white/5">
                     <p class="text-xs text-neutral-400 leading-relaxed">${o.items.map(i => `${i.name} <span class='text-neutral-600'>x${i.quantity}</span>`).join(', ')}</p>
                </div>
                <button onclick="updateStatus('${o._id}', '${getNextStatus(o.status)}')" class="w-full btn-glow py-3 rounded-xl text-xs tracking-wider font-bold hover:tracking-widest transition-all">
                    ${btnText.toUpperCase()}
                </button>
            </div>`;
        }

        function pickingCard(o) {
            return `
            <div class="glass-card rounded-2xl p-5 border-brand-accent/20 relative" id="order-container-${o._id}">
                <div class="flex justify-between items-center mb-4">
                    <p class="font-mono text-[10px] text-neutral-500 uppercase tracking-widest">${o.orderId}</p>
                    <span class="badge-yellow text-[10px] px-2 py-1 rounded-full font-semibold">PICKING</span>
                </div>
                <ul class="space-y-2 mb-6" id="item-list-${o._id}">
                    ${o.items.map((i, index) => `
                        <li id="item-${o._id}-${index}" class="flex items-center justify-between text-sm bg-black/20 p-3 rounded-xl border border-white/5 transition-all">
                            <div class="flex items-center gap-3">
                                <span class="item-status-icon text-neutral-600">
                                   <iconify-icon icon="lucide:circle" width="16"></iconify-icon>
                                </span>
                                <span class="font-medium">${i.name} <span class="text-neutral-600 text-xs">x${i.quantity}</span></span>
                            </div>
                            <div class="item-actions flex gap-2">
                                <button onclick="markItem('${o._id}', ${index}, 'picked')" class="px-2 py-1 text-[10px] bg-green-500/10 text-green-500 rounded-md hover:bg-green-500/20 font-medium transition-colors border border-green-500/20">Pick</button>
                                <button onclick="markItem('${o._id}', ${index}, 'oos')" class="px-2 py-1 text-[10px] bg-red-500/10 text-red-500 rounded-md hover:bg-red-500/20 font-medium transition-colors border border-red-500/20">OOS</button>
                            </div>
                        </li>
                    `).join('')}
                </ul>
                
                <button id="ready-btn-${o._id}" onclick="updateStatus('${o._id}', 'ready')" disabled class="w-full border border-white/10 text-neutral-600 font-semibold py-3 rounded-xl text-xs transition-colors cursor-not-allowed">
                    All items must be picked
                </button>
            </div>`;
        }

        function markItem(orderId, itemIndex, status) {
            const itemEl = document.getElementById(`item-${orderId}-${itemIndex}`);
            const iconEl = itemEl.querySelector('.item-status-icon');
            const btns = itemEl.querySelector('.item-actions');
            
            btns.innerHTML = `<span class="text-[10px] font-medium ${status === 'picked' ? 'text-green-500' : 'text-red-500'}">${status === 'picked' ? 'Packed' : 'Removed'}</span>`;
            
            if (status === 'picked') {
                iconEl.innerHTML = '<iconify-icon icon="lucide:check-circle" width="16" class="text-green-500"></iconify-icon>';
                itemEl.classList.add('opacity-50');
            } else {
                iconEl.innerHTML = '<iconify-icon icon="lucide:x-circle" width="16" class="text-red-500"></iconify-icon>';
                itemEl.classList.add('opacity-50', 'line-through');
            }

            const listEl = document.getElementById(`item-list-${orderId}`);
            const totalItems = listEl.children.length;
            const processedItems = listEl.querySelectorAll('.opacity-50').length;

            if (processedItems === totalItems) {
                const readyBtn = document.getElementById(`ready-btn-${orderId}`);
                readyBtn.disabled = false;
                readyBtn.classList.remove('border-white/10', 'text-neutral-600', 'cursor-not-allowed');
                readyBtn.classList.add('border-brand-accent', 'text-brand-accent', 'hover:bg-brand-accent/10');
                readyBtn.textContent = "Mark Ready for Delivery";
            }
        }

        // --- DELIVERY LOGIC ---
        function deliveryCard(o) {
            let addr = o.userAddress || o.deliveryAddress || o.address || o.shippingAddress || {};
            let lat = parseFloat(addr.lat || o.lat || addr.latitude);
            let lng = parseFloat(addr.lng || o.lng || addr.longitude);
            
            const hasValidCoords = !isNaN(lat) && !isNaN(lng) && (lat !== 0 && lng !== 0);
            
            const displayArea = addr.area || 'Area not specified';
            const displayHouse = addr.houseNo || '';
            const displayBuilding = addr.building || '';
            const fullAddress = `${displayHouse} ${displayBuilding}`.trim() || 'Address details missing';
            
            let actionButtons = '';
            let debugBtn = `<button onclick='showDebug(\`${JSON.stringify(o).replace(/`/g, "'")}\`)' class="text-neutral-600 text-[10px] mt-2 underline w-full text-center">Debug Data</button>`;

            if (hasValidCoords) {
                const navLink = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
                const safeAddress = fullAddress.replace(/'/g, "\\'");
                actionButtons = `
                    <div class="grid grid-cols-2 gap-3 mt-3">
                        <button onclick="openMap(${lat}, ${lng}, '${safeAddress}')" class="bg-white/5 hover:bg-white/10 text-white px-3 py-2.5 rounded-xl font-medium flex items-center justify-center gap-2 transition-colors border border-white/10">
                            <iconify-icon icon="lucide:map-pin" width="14" class="text-brand-accent"></iconify-icon> Map
                        </button>
                        <a href="${navLink}" target="_blank" class="bg-blue-500/10 hover:bg-blue-500/20 text-blue-500 px-3 py-2.5 rounded-xl font-medium flex items-center justify-center gap-2 transition-colors border border-blue-500/20">
                            <iconify-icon icon="lucide:navigation" width="14"></iconify-icon> Navigate
                        </a>
                    </div>
                `;
                debugBtn = '';
            } else {
                actionButtons = `
                    <div class="bg-red-500/5 border border-red-500/10 rounded-xl p-3 text-center mt-3">
                        <p class="text-red-400 text-xs font-medium flex items-center justify-center gap-1">
                            <iconify-icon icon="lucide:alert-circle" width="12"></iconify-icon>
                            Location coordinates missing
                        </p>
                    </div>
                `;
            }

            return `
            <div class="glass-card rounded-2xl overflow-hidden flex flex-col">
                <div class="p-5 flex-1">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="font-mono text-[10px] text-neutral-500 uppercase tracking-widest">${o.orderId}</p>
                            <p class="font-bold text-xl mt-1">${o.userName}</p>
                        </div>
                        <a href="tel:${o.userPhone}" class="h-10 w-10 bg-green-500/10 hover:bg-green-500/20 text-green-500 rounded-full flex items-center justify-center transition-colors border border-green-500/20">
                            <iconify-icon icon="lucide:phone" width="16"></iconify-icon>
                        </a>
                    </div>
                    
                    <div class="bg-black/20 rounded-xl p-4 text-sm border border-white/5">
                        <p class="text-neutral-500 text-[10px] uppercase tracking-widest mb-1">Deliver to</p>
                        <p class="font-medium text-white">${fullAddress}</p>
                        <p class="text-neutral-500 text-xs mt-1">${displayArea}</p>
                    </div>

                    ${actionButtons}
                    ${debugBtn}
                </div>
                
                <div class="border-t border-white/5 p-4 bg-black/20">
                     <button onclick="updateStatus('${o._id}', 'delivered')" class="w-full bg-green-500 text-white font-bold py-3 rounded-xl text-xs hover:bg-green-600 transition-colors flex items-center justify-center gap-2 shadow-lg shadow-green-500/20">
                        <iconify-icon icon="lucide:check" width="16"></iconify-icon> Confirm Delivered
                    </button>
                </div>
            </div>`;
        }

        function showDebug(jsonStr) {
            try {
                const obj = JSON.parse(jsonStr);
                document.getElementById('debugContent').textContent = JSON.stringify(obj, null, 2);
                document.getElementById('debugModal').classList.remove('hidden');
            } catch(e) { console.error(e); }
        }

        function emptyState(msg) { 
            return `<div class="col-span-full flex flex-col items-center justify-center py-20 opacity-50">
                        <iconify-icon icon="lucide:package" width="32" class="mb-2"></iconify-icon>
                        <p>${msg}</p>
                    </div>`; 
        }

        function getNextStatus(current) {
            if(current === 'pending') return 'picking';
            if(current === 'ready') return 'out_for_delivery';
            return 'delivered';
        }

        async function updateStatus(id, status) {
            try {
                await fetch(`${API_URL}/api/orders/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                loadData();
                if(navigator.vibrate) navigator.vibrate(100);
            } catch(e) {
                alert("Error updating status");
            }
        }

        // --- LEAFLET MAP LOGIC ---
        function openMap(lat, lng, address) {
            document.getElementById('mapAddressText').textContent = address || 'Unknown Address';
            document.getElementById('mapCoordsText').textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            document.getElementById('mapNavBtn').href = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
            
            document.getElementById('mapModal').classList.remove('hidden');
            document.getElementById('mapModal').classList.add('flex');

            setTimeout(() => {
                if (!locationMap) {
                    locationMap = L.map('modalMap').setView([lat, lng], 15);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { // Dark Map Tiles
                        attribution: '© OpenStreetMap © CartoDB'
                    }).addTo(locationMap);
                    locationMarker = L.marker([lat, lng]).addTo(locationMap);
                } else {
                    locationMap.setView([lat, lng], 15);
                    locationMarker.setLatLng([lat, lng]);
                }
                locationMap.invalidateSize();
            }, 100);
        }

        function closeMapModal() {
            document.getElementById('mapModal').classList.add('hidden');
            document.getElementById('mapModal').classList.remove('flex');
        }

        // --- CURSOR ---
        function setupCursor() { 
            const d=document.getElementById('cursor-dot'), r=document.getElementById('cursor-ring'); 
            if(!d || !r) return; 
            document.addEventListener('mousemove', e => { 
                d.style.left=e.clientX-4+'px'; d.style.top=e.clientY-4+'px'; 
                r.style.left=e.clientX-20+'px'; r.style.top=e.clientY-20+'px'; 
            }); 
            
            document.querySelectorAll('button, a, input').forEach(el => {
                el.addEventListener('mouseenter', () => r.classList.add('hover'));
                el.addEventListener('mouseleave', () => r.classList.remove('hover'));
            });
        }
    </script>
</body>
</html>
