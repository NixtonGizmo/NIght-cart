<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - Night Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <!-- LEAFLET CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { black: '#050505', dark: '#0a0a0a', gray: '#171717', accent: '#8CFF00', yellow: '#FFD700' } } } } }
    </script>
    <style>
        * { cursor: none; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0a0a0a; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::selection { background: white; color: black; }
        
        #cursor-dot { width: 8px; height: 8px; background: white; position: fixed; pointer-events: none; z-index: 99999; border-radius: 50%; mix-blend-mode: difference; }
        #cursor-ring { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.8); position: fixed; pointer-events: none; z-index: 99998; border-radius: 50%; transition: width 0.15s; }

        .tab-btn.active { background: rgba(140, 255, 0, 0.1); color: #8CFF00; border-color: rgba(140, 255, 0, 0.3); }

        .item-processed { opacity: 0.6; }
        .item-oos { text-decoration: line-through; }

        /* FIX: Explicitly define map height */
        #modalMap { width: 100%; height: 300px; background: #050505; border-radius: 12px; z-index: 10; }
    </style>
</head>
<body class="bg-brand-black text-white font-sans antialiased">
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- STAFF LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-brand-black">
        <div class="bg-brand-gray rounded-3xl w-full max-w-sm border border-white/10 shadow-2xl p-8 text-center">
            <div class="w-16 h-16 bg-brand-accent/10 rounded-full flex items-center justify-center mx-auto mb-4">
                <iconify-icon icon="lucide:truck" width="32" class="text-brand-accent"></iconify-icon>
            </div>
            <h1 class="text-2xl font-bold mb-2">Staff Portal</h1>
            <p class="text-neutral-400 text-sm mb-6">Login to access dashboard</p>
            
            <form onsubmit="staffLogin(event)" class="space-y-4">
                <input type="tel" id="staffPhone" placeholder="Phone Number" class="w-full bg-brand-black border border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brand-accent">
                <input type="password" id="staffPass" placeholder="Password (1234)" class="w-full bg-brand-black border border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brand-accent">
                <button type="submit" class="w-full bg-brand-accent text-black font-bold py-3 rounded-full hover:bg-brand-yellow transition-colors">Login</button>
            </form>
            <p id="loginError" class="text-red-500 text-xs mt-4 hidden">Invalid credentials</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboardScreen" class="hidden">
        <!-- Top Nav -->
        <nav class="fixed top-0 left-0 right-0 z-30 bg-brand-black/90 backdrop-blur-xl border-b border-white/5">
            <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
                <h1 class="font-bold text-lg">Staff Dashboard</h1>
                <div class="flex items-center gap-3">
                    <span id="staffName" class="text-sm text-neutral-400"></span>
                    <button onclick="staffLogout()" class="text-xs bg-white/5 px-3 py-1 rounded-full hover:bg-white/10">Logout</button>
                </div>
            </div>
            
            <!-- Tabs -->
            <div class="max-w-7xl mx-auto px-4 pb-3 flex gap-2 overflow-x-auto">
                <button onclick="switchTab('new')" id="tab-new" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full border border-white/10 text-sm font-medium transition-all">
                    New Orders <span id="count-new" class="ml-1 text-xs opacity-60">(0)</span>
                </button>
                <button onclick="switchTab('picking')" id="tab-picking" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full border border-white/10 text-sm font-medium transition-all">
                    Picking <span id="count-picking" class="ml-1 text-xs opacity-60">(0)</span>
                </button>
                <button onclick="switchTab('ready')" id="tab-ready" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full border border-white/10 text-sm font-medium transition-all">
                    Ready <span id="count-ready" class="ml-1 text-xs opacity-60">(0)</span>
                </button>
                <button onclick="switchTab('delivery')" id="tab-delivery" class="tab-btn flex-shrink-0 px-4 py-2 rounded-full border border-white/10 text-sm font-medium transition-all">
                    Out for Delivery <span id="count-delivery" class="ml-1 text-xs opacity-60">(0)</span>
                </button>
            </div>
        </nav>

        <!-- Content -->
        <main class="pt-32 pb-8 px-4 max-w-7xl mx-auto">
            <div id="list-new" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>
            <div id="list-picking" class="grid md:grid-cols-2 gap-4 hidden"></div>
            <div id="list-ready" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>
            <div id="list-delivery" class="grid md:grid-cols-1 lg:grid-cols-2 gap-4 hidden"></div>
        </main>
    </div>

    <!-- MAP MODAL -->
    <div id="mapModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="bg-brand-gray rounded-2xl w-full max-w-lg border border-white/10 overflow-hidden flex flex-col max-h-[90vh] shadow-2xl">
            <div class="p-4 border-b border-white/5 flex justify-between items-center">
                <h3 class="font-semibold">Delivery Location</h3>
                <button onclick="closeMapModal()" class="text-neutral-400 hover:text-white"><iconify-icon icon="lucide:x" width="20"></iconify-icon></button>
            </div>
            
            <!-- Map Container -->
            <div id="modalMap"></div>
            
            <div class="p-4 bg-brand-black/50 text-sm">
                <p class="font-medium text-white mb-1" id="mapAddressText">Address</p>
                <p class="text-neutral-400 text-xs" id="mapCoordsText">Coordinates</p>
                <div class="flex gap-2 mt-3">
                    <a id="mapCallBtn" href="tel:" class="flex-1 text-center bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1">
                        <iconify-icon icon="lucide:phone" width="14"></iconify-icon> Call
                    </a>
                    <a id="mapNavBtn" href="#" target="_blank" class="flex-1 text-center bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1">
                        <iconify-icon icon="lucide:navigation" width="14"></iconify-icon> Navigate
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://night-cart.onrender.com';
        let orders = [];
        let currentTab = 'new';
        let locationMap = null;
        let locationMarker = null;

        document.addEventListener('DOMContentLoaded', () => {
            setupCursor();
            if (localStorage.getItem('nc_staff_auth') === 'true') {
                showDashboard();
            }
        });

        // --- AUTH ---
        async function staffLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('staffPhone').value;
            const pass = document.getElementById('staffPass').value;

            try {
                const res = await fetch(`${API_URL}/api/staff/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('nc_staff_auth', 'true');
                    localStorage.setItem('nc_staff_phone', phone);
                    showDashboard();
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            } catch(e) {
                document.getElementById('loginError').textContent = "Server error";
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function staffLogout() {
            localStorage.removeItem('nc_staff_auth');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('staffName').textContent = localStorage.getItem('nc_staff_phone');
            loadData();
            setInterval(loadData, 10000);
        }

        // --- DATA LOGIC ---
        async function loadData() {
            try {
                const res = await fetch(`${API_URL}/api/staff/orders`);
                orders = await res.json();
                renderLists();
            } catch(e) {
                console.error("Failed to load orders");
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('[id^="list-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`list-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        function renderLists() {
            const newOrders = orders.filter(o => o.status === 'pending');
            const pickingOrders = orders.filter(o => o.status === 'picking');
            const readyOrders = orders.filter(o => o.status === 'ready');
            const deliveryOrders = orders.filter(o => o.status === 'out_for_delivery');

            document.getElementById('count-new').textContent = `(${newOrders.length})`;
            document.getElementById('count-picking').textContent = `(${pickingOrders.length})`;
            document.getElementById('count-ready').textContent = `(${readyOrders.length})`;
            document.getElementById('count-delivery').textContent = `(${deliveryOrders.length})`;

            document.getElementById('list-new').innerHTML = newOrders.map(o => orderCard(o, 'Accept & Pick')).join('') || emptyState("No new orders");
            document.getElementById('list-picking').innerHTML = pickingOrders.map(o => pickingCard(o)).join('') || emptyState("No items being picked");
            document.getElementById('list-ready').innerHTML = readyOrders.map(o => orderCard(o, 'Start Delivery')).join('') || emptyState("No orders ready");
            document.getElementById('list-delivery').innerHTML = deliveryOrders.map(o => deliveryCard(o)).join('') || emptyState("No active deliveries");
        }

        function orderCard(o, btnText) {
            return `
            <div class="bg-brand-gray rounded-2xl p-5 border border-white/5">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <p class="font-mono text-xs text-neutral-500">${o.orderId}</p>
                        <p class="font-semibold">${o.userName}</p>
                    </div>
                    <span class="text-lg font-bold text-brand-accent">₹${o.totalAmount}</span>
                </div>
                <p class="text-xs text-neutral-400 mb-4">${o.items.map(i => `${i.name} x${i.quantity}`).join(', ')}</p>
                <button onclick="updateStatus('${o._id}', '${getNextStatus(o.status)}')" class="w-full bg-brand-accent text-black font-semibold py-2 rounded-lg text-sm hover:bg-brand-yellow transition-colors">
                    ${btnText}
                </button>
            </div>`;
        }

        // --- PICKING LOGIC ---
        function pickingCard(o) {
            return `
            <div class="bg-brand-gray rounded-2xl p-5 border border-brand-accent/30 relative" id="order-container-${o._id}">
                <div class="flex justify-between items-center mb-3">
                    <p class="font-mono text-xs text-neutral-500">${o.orderId}</p>
                    <span class="text-xs px-2 py-1 rounded bg-yellow-500/10 text-yellow-500">PICKING</span>
                </div>
                <h3 class="font-bold mb-3">Items to Pack:</h3>
                <ul class="space-y-2 mb-6" id="item-list-${o._id}">
                    ${o.items.map((i, index) => `
                        <li id="item-${o._id}-${index}" class="flex items-center justify-between text-sm bg-brand-black/30 p-2 rounded-lg transition-all">
                            <div class="flex items-center gap-2">
                                <span class="item-status-icon text-neutral-500">
                                   <iconify-icon icon="lucide:circle" width="16"></iconify-icon>
                                </span>
                                <span class="item-name">${i.name} <span class="text-neutral-500">x${i.quantity}</span></span>
                            </div>
                            <div class="item-actions flex gap-1">
                                <button onclick="markItem('${o._id}', ${index}, 'picked')" class="px-2 py-1 text-[10px] bg-green-500/10 text-green-500 rounded hover:bg-green-500/20 font-medium">Pick</button>
                                <button onclick="markItem('${o._id}', ${index}, 'oos')" class="px-2 py-1 text-[10px] bg-red-500/10 text-red-500 rounded hover:bg-red-500/20 font-medium">OOS</button>
                            </div>
                        </li>
                    `).join('')}
                </ul>
                
                <button id="ready-btn-${o._id}" onclick="updateStatus('${o._id}', 'ready')" disabled class="w-full border border-brand-accent/30 text-brand-accent/30 font-semibold py-2 rounded-lg text-sm transition-colors cursor-not-allowed">
                    Mark Ready for Delivery (Pack all items)
                </button>
            </div>`;
        }

        function markItem(orderId, itemIndex, status) {
            const itemEl = document.getElementById(`item-${orderId}-${itemIndex}`);
            const iconEl = itemEl.querySelector('.item-status-icon');
            const btns = itemEl.querySelector('.item-actions');
            
            btns.innerHTML = `<span class="text-[10px] text-neutral-500">${status === 'picked' ? 'Packed' : 'Removed'}</span>`;
            
            if (status === 'picked') {
                iconEl.innerHTML = '<iconify-icon icon="lucide:check-circle" width="16" class="text-green-500"></iconify-icon>';
                itemEl.classList.add('item-processed');
            } else {
                iconEl.innerHTML = '<iconify-icon icon="lucide:x-circle" width="16" class="text-red-500"></iconify-icon>';
                itemEl.classList.add('item-processed', 'item-oos');
            }

            const listEl = document.getElementById(`item-list-${orderId}`);
            const totalItems = listEl.children.length;
            const processedItems = listEl.querySelectorAll('.item-processed').length;

            if (processedItems === totalItems) {
                const readyBtn = document.getElementById(`ready-btn-${orderId}`);
                readyBtn.disabled = false;
                readyBtn.classList.remove('border-brand-accent/30', 'text-brand-accent/30', 'cursor-not-allowed');
                readyBtn.classList.add('border-brand-accent', 'text-brand-accent', 'hover:bg-brand-accent/10');
                readyBtn.textContent = "Mark Ready for Delivery";
            }
        }

        // --- DELIVERY LOGIC (FIXED) ---
        function deliveryCard(o) {
            // 1. Safe extraction with fallbacks
            const addr = o.userAddress || {};
            const lat = parseFloat(addr.lat);
            const lng = parseFloat(addr.lng);
            
            // 2. Check if coordinates are valid numbers
            const hasValidCoords = !isNaN(lat) && !isNaN(lng) && (lat !== 0 && lng !== 0);
            
            // 3. Prepare display text
            const displayArea = addr.area || 'Area not specified';
            const displayHouse = addr.houseNo || '';
            const displayBuilding = addr.building || '';
            const fullAddress = `${displayHouse} ${displayBuilding}`.trim() || 'Address details missing';
            
            // 4. Generate Buttons
            let mapBtn = '';
            let navBtn = '';

            if (hasValidCoords) {
                const navLink = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
                // Pass full address to map function, escape quotes
                const safeAddress = fullAddress.replace(/'/g, "\\'");
                mapBtn = `<button onclick="openMap(${lat}, ${lng}, '${safeAddress}')" class="text-brand-accent text-xs font-medium flex items-center justify-center gap-1 py-2 rounded-lg border border-white/5 hover:bg-white/5">
                            <iconify-icon icon="lucide:map-pin" width="12"></iconify-icon> View Map
                        </button>`;
                navBtn = `<a href="${navLink}" target="_blank" class="text-blue-400 text-xs font-medium flex items-center justify-center gap-1 py-2 rounded-lg border border-blue-500/20 hover:bg-blue-500/10">
                            <iconify-icon icon="lucide:navigation" width="12"></iconify-icon> Navigate
                        </a>`;
            } else {
                mapBtn = `<span class="text-neutral-500 text-xs font-medium flex items-center justify-center gap-1 py-2 rounded-lg border border-white/5">
                            <iconify-icon icon="lucide:alert-circle" width="12"></iconify-icon> No Coords
                        </span>`;
                navBtn = `<span class="text-neutral-500 text-xs font-medium flex items-center justify-center gap-1 py-2 rounded-lg border border-white/5">
                            Location Missing
                        </span>`;
            }

            return `
            <div class="bg-brand-gray rounded-2xl overflow-hidden border border-white/5">
                <div class="p-5">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="font-mono text-xs text-neutral-500">${o.orderId}</p>
                            <p class="font-bold text-xl">${o.userName}</p>
                        </div>
                        <a href="tel:${o.userPhone}" class="bg-green-500 text-white px-4 py-2 rounded-full text-xs font-bold flex items-center gap-1">
                            <iconify-icon icon="lucide:phone" width="12"></iconify-icon> Call
                        </a>
                    </div>
                    
                    <div class="bg-brand-black/50 p-3 rounded-xl mt-3 text-sm">
                        <p class="text-neutral-400 text-xs mb-1">Deliver to:</p>
                        <p class="font-medium">${fullAddress}</p>
                        <p class="text-neutral-500">${displayArea}</p>
                    </div>

                    <div class="mt-3 grid grid-cols-2 gap-2">
                        ${mapBtn}
                        ${navBtn}
                    </div>
                </div>
                
                <div class="border-t border-white/5 p-3 bg-brand-dark/50">
                     <button onclick="updateStatus('${o._id}', 'delivered')" class="w-full bg-green-500 text-white font-bold py-3 rounded-xl text-sm hover:bg-green-600 transition-colors flex items-center justify-center gap-2">
                        <iconify-icon icon="lucide:check-circle" width="16"></iconify-icon> Confirm Delivered
                    </button>
                </div>
            </div>`;
        }

        function emptyState(msg) { return `<div class="col-span-full text-center py-16 text-neutral-500">${msg}</div>`; }

        function getNextStatus(current) {
            if(current === 'pending') return 'picking';
            if(current === 'ready') return 'out_for_delivery';
            return 'delivered';
        }

        async function updateStatus(id, status) {
            try {
                await fetch(`${API_URL}/api/orders/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                loadData();
                if(navigator.vibrate) navigator.vibrate(100);
            } catch(e) {
                alert("Error updating status");
            }
        }

        // --- LEAFLET MAP LOGIC (FIXED) ---
        function openMap(lat, lng, address) {
            // 1. Update UI Text
            document.getElementById('mapAddressText').textContent = address || 'Unknown Address';
            document.getElementById('mapCoordsText').textContent = `Lat: ${lat.toFixed(5)}, Lng: ${lng.toFixed(5)}`;
            document.getElementById('mapNavBtn').href = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
            
            // 2. Show Modal
            document.getElementById('mapModal').classList.remove('hidden');
            document.getElementById('mapModal').classList.add('flex');

            // 3. Initialize or Update Map
            setTimeout(() => {
                if (!locationMap) {
                    locationMap = L.map('modalMap').setView([lat, lng], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap'
                    }).addTo(locationMap);
                    locationMarker = L.marker([lat, lng]).addTo(locationMap);
                } else {
                    locationMap.setView([lat, lng], 15);
                    locationMarker.setLatLng([lat, lng]);
                }
                
                // 4. Force map to recalculate size
                locationMap.invalidateSize();
            }, 100);
        }

        function closeMapModal() {
            document.getElementById('mapModal').classList.add('hidden');
            document.getElementById('mapModal').classList.remove('flex');
        }

        // --- CURSOR ---
        function setupCursor() { 
            const d=document.getElementById('cursor-dot'), r=document.getElementById('cursor-ring'); 
            if(!d || !r) return; 
            document.addEventListener('mousemove', e => { 
                d.style.left=e.clientX-4+'px'; d.style.top=e.clientY-4+'px'; 
                r.style.left=e.clientX-20+'px'; r.style.top=e.clientY-20+'px'; 
            }); 
        }
    </script>
</body>
</html>
