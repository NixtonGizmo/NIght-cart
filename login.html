<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Night Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Enable class-based dark mode
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            black: '#0f172a', dark: '#020617', gray: '#1e293b', light: '#64748b',
                            yellow: '#FFD700', green: '#22C55E', accent: '#6366f1' // Modern Indigo
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { cursor: none; }
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: #f1f5f9; } 
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-track { background: #0f172a; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        
        ::selection { background: #6366f1; color: white; }
        
        /* Cursor Styles */
        #cursor-dot { width: 8px; height: 8px; background: #6366f1; position: fixed; pointer-events: none; z-index: 99999; border-radius: 50%; transition: background 0.2s; }
        #cursor-ring { width: 40px; height: 40px; border: 1px solid rgba(99, 102, 241, 0.3); position: fixed; pointer-events: none; z-index: 9998; border-radius: 50%; transition: width 0.2s; }
        #cursor-ring.hover { width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); border-color: #6366f1; }

        /* Dark Mode Cursor Fix */
        .dark #cursor-dot { background: white; mix-blend-mode: difference; }
        .dark #cursor-ring { border-color: rgba(255,255,255,0.3); }
        
        /* OTP Inputs */
        .otp-input { 
            width: 60px; height: 60px; text-align: center; font-size: 24px; font-weight: 600; 
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; 
            color: #0f172a; transition: all 0.2s; 
        }
        .otp-input:focus { border-color: rgba(99, 102, 241, 0.5); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1); }
        
        .dark .otp-input { 
            background: #0f172a; border-color: #334155; color: white; 
        }
        .dark .otp-input:focus { border-color: rgba(99, 102, 241, 0.5); }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
        .dark input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .popup-animate { animation: scaleIn 0.3s ease-out forwards; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }

        /* Toggle Button Styles */
        .toggle-btn { background: #f1f5f9; }
        .dark .toggle-btn { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="font-sans antialiased bg-slate-50 text-slate-900 dark:bg-brand-dark dark:text-slate-200 transition-colors duration-300">
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    
    <!-- SUCCESS POPUP -->
    <div id="successModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-white dark:bg-brand-gray rounded-3xl w-full max-w-sm border border-slate-200 dark:border-white/10 shadow-2xl text-center popup-animate">
            <div class="p-8">
                <div class="w-20 h-20 bg-green-50 dark:bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                    <iconify-icon icon="lucide:check-circle" width="40" class="text-green-500"></iconify-icon>
                </div>
                <h2 class="text-2xl font-bold mb-2">Login Successful!</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm mb-6">Welcome back to Night Cart.</p>
                <div class="flex items-center justify-center gap-2 text-brand-accent text-sm">
                    <iconify-icon icon="lucide:loader-2" width="16" class="animate-spin"></iconify-icon>
                    Redirecting...
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-30 bg-white/90 dark:bg-brand-dark/90 backdrop-blur-xl border-b border-slate-200 dark:border-white/5">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16 md:h-20">
                <!-- LOGO SVG -->
                <a href="index.html" class="flex items-center group hover:opacity-80 transition-opacity">
                    <svg width="140" height="50" viewBox="0 0 300 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M35 5 A25 25 0 1 1 35 55 A20 20 0 1 0 35 5" fill="#0f172a" class="dark:fill-white"/>
                        <g transform="translate(12, 18) scale(0.8)" fill="#6366f1">
                            <path d="M0 0 L4 0 L6 12 L30 12 L28 4 L8 4 L8 2 L30 2 L34 16 L4 16 L0 0 Z" />
                            <circle cx="10" cy="22" r="4" /><circle cx="26" cy="22" r="4" />
                        </g>
                        <text x="85" y="60" font-family="'Inter', sans-serif" font-weight="700" font-size="32">
                            <tspan fill="#0f172a" class="dark:fill-white">Night</tspan><tspan fill="#6366f1">cart</tspan>
                        </text>
                    </svg>
                </a>
                
                <div class="flex items-center gap-3">
                    <!-- Theme Toggle -->
                    <button onclick="toggleTheme()" id="themeToggle" class="p-2 rounded-full bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">
                        <iconify-icon icon="lucide:sun" width="18" class="text-yellow-500" id="sunIcon"></iconify-icon>
                        <iconify-icon icon="lucide:moon" width="18" class="text-slate-600 hidden" id="moonIcon"></iconify-icon>
                    </button>

                    <a href="index.html" class="flex items-center gap-2 px-4 py-2 text-sm text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors">
                        <iconify-icon icon="lucide:arrow-left" width="16"></iconify-icon> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="min-h-screen flex items-center justify-center pt-20 px-6">
        <div class="w-full max-w-md">
            
            <!-- STEP 1: Phone -->
            <div id="phoneStep" class="bg-white dark:bg-brand-gray rounded-3xl border border-slate-200 dark:border-white/5 p-8 md:p-10 shadow-lg dark:shadow-none animate-fade-in">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-50 dark:bg-brand-accent/10 rounded-2xl mb-4">
                        <iconify-icon icon="lucide:smartphone" width="28" class="text-brand-accent"></iconify-icon>
                    </div>
                    <h1 class="text-2xl font-semibold tracking-tight">Login with OTP</h1>
                    <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">Enter your phone number to receive a code</p>
                </div>
                <form onsubmit="showOTPStep(event)" class="space-y-5">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-2">Phone Number</label>
                        <div class="flex gap-2">
                            <div class="flex items-center justify-center px-4 py-3.5 bg-slate-100 dark:bg-brand-black border border-slate-200 dark:border-white/10 rounded-xl text-slate-500 dark:text-slate-400 font-medium">+91</div>
                            <input type="tel" id="phoneNumber" placeholder="Enter 10 digit number" maxlength="10" required class="flex-1 bg-slate-50 dark:bg-brand-black border border-slate-200 dark:border-white/10 rounded-xl py-3.5 px-4 text-sm focus:outline-none focus:border-brand-accent/50 transition-all tracking-wide text-slate-900 dark:text-white">
                        </div>
                    </div>
                    <button id="getOtpBtn" type="submit" class="w-full bg-brand-accent text-white font-semibold py-3.5 rounded-full hover:bg-indigo-600 transition-colors mt-6 shadow-lg shadow-indigo-500/20">Get OTP</button>
                </form>
            </div>

            <!-- STEP 2: OTP -->
            <div id="otpStep" class="bg-white dark:bg-brand-gray rounded-3xl border border-slate-200 dark:border-white/5 p-8 md:p-10 shadow-lg dark:shadow-none hidden">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-50 dark:bg-brand-accent/10 rounded-2xl mb-4">
                        <iconify-icon icon="lucide:lock" width="28" class="text-brand-accent"></iconify-icon>
                    </div>
                    <h1 class="text-2xl font-semibold tracking-tight">Verify OTP</h1>
                    <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">Enter the 4-digit code sent to <span id="displayPhone" class="text-slate-900 dark:text-white font-medium">+91 XXXXXXXXXX</span></p>
                </div>
                <div class="flex justify-center gap-3 mb-8">
                    <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 1)">
                    <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 2)">
                    <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 3)">
                    <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 4)">
                </div>
                <button id="verifyBtn" type="button" onclick="verifyOTP()" class="w-full bg-brand-accent text-white font-semibold py-3.5 rounded-full hover:bg-indigo-600 transition-colors shadow-lg shadow-indigo-500/20">Verify & Login</button>
                <div class="text-center mt-6"><button onclick="goBack(1)" class="text-xs text-slate-400 hover:text-slate-900 dark:hover:text-white mt-3 block mx-auto">Change Phone Number</button></div>
            </div>

            <!-- STEP 3: Complete Profile -->
            <div id="profileStep" class="bg-white dark:bg-brand-gray rounded-3xl border border-slate-200 dark:border-white/5 p-8 md:p-10 shadow-lg dark:shadow-none hidden">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-50 dark:bg-brand-accent/10 rounded-2xl mb-4">
                        <iconify-icon icon="lucide:user-plus" width="28" class="text-brand-accent"></iconify-icon>
                    </div>
                    <h1 class="text-2xl font-semibold tracking-tight">Complete Profile</h1>
                    <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">Just a few more details to get started</p>
                </div>
                <form onsubmit="saveProfile(event)" class="space-y-5">
                    <div>
                        <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1 uppercase">Full Name</label>
                        <input type="text" id="profileName" placeholder="Enter your name" required class="w-full bg-slate-50 dark:bg-brand-black border border-slate-200 dark:border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brand-accent/50 text-slate-900 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1 uppercase">Date of Birth</label>
                        <input type="date" id="profileDob" required class="w-full bg-slate-50 dark:bg-brand-black border border-slate-200 dark:border-white/10 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-brand-accent/50 text-slate-900 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1 uppercase">Gender</label>
                        <div class="flex gap-4">
                            <label class="flex-1 flex items-center gap-2 p-3 bg-slate-50 dark:bg-brand-black border border-slate-200 dark:border-white/10 rounded-xl cursor-pointer hover:border-brand-accent/50">
                                <input type="radio" name="gender" value="male" required class="accent-brand-accent"> 
                                <span class="text-sm text-slate-700 dark:text-slate-300">Male</span>
                            </label>
                            <label class="flex-1 flex items-center gap-2 p-3 bg-slate-50 dark:bg-brand-black border border-slate-200 dark:border-white/10 rounded-xl cursor-pointer hover:border-brand-accent/50">
                                <input type="radio" name="gender" value="female" class="accent-brand-accent"> 
                                <span class="text-sm text-slate-700 dark:text-slate-300">Female</span>
                            </label>
                        </div>
                    </div>
                    <button id="saveProfileBtn" type="submit" class="w-full bg-brand-accent text-white font-semibold py-3.5 rounded-full hover:bg-indigo-600 transition-colors mt-6 shadow-lg shadow-indigo-500/20">Save & Continue</button>
                </form>
            </div>
            
        </div>
    </main>
    
    <script>
        const API_URL = 'https://night-cart.onrender.com'; 
        let currentPhone = '';
        
        document.addEventListener('DOMContentLoaded', () => { 
            setupCursor(); 
            loadTheme();
        });

        // --- THEME LOGIC ---
        function loadTheme() {
            if (localStorage.getItem('nc_theme') === 'dark' || 
                (!('nc_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('sunIcon').classList.add('hidden');
                document.getElementById('moonIcon').classList.remove('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('sunIcon').classList.remove('hidden');
                document.getElementById('moonIcon').classList.add('hidden');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('nc_theme', 'light');
                document.getElementById('sunIcon').classList.remove('hidden');
                document.getElementById('moonIcon').classList.add('hidden');
            } else {
                html.classList.add('dark');
                localStorage.setItem('nc_theme', 'dark');
                document.getElementById('sunIcon').classList.add('hidden');
                document.getElementById('moonIcon').classList.remove('hidden');
            }
        }

        function setupCursor() { 
            const d=document.getElementById('cursor-dot'), r=document.getElementById('cursor-ring'); 
            document.addEventListener('mousemove',e=>{d.style.left=e.clientX-4+'px';d.style.top=e.clientY-4+'px';r.style.left=e.clientX-20+'px';r.style.top=e.clientY-20+'px';}); 
        }
        
        function showSuccessModal() { const m=document.getElementById('successModal'); m.classList.remove('hidden'); m.classList.add('flex'); }
        
        async function showOTPStep(e) { 
            e.preventDefault(); 
            const p=document.getElementById('phoneNumber').value; 
            if(p.length!==10){alert("Valid 10-digit number required");return;} 
            currentPhone="+91"+p; 
            const b=document.getElementById('getOtpBtn'); 
            b.innerHTML='<iconify-icon icon="lucide:loader-2" width="18" class="animate-spin"></iconify-icon> Sending...'; 
            b.disabled=true; 
            try{ 
                const r=await fetch(`${API_URL}/api/send-otp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:currentPhone})}); 
                const d=await r.json(); 
                if(d.success){ 
                    document.getElementById('displayPhone').innerText=currentPhone; 
                    document.getElementById('phoneStep').classList.add('hidden'); 
                    document.getElementById('otpStep').classList.remove('hidden'); 
                }else{alert("Error: " + (d.message || "Unknown error"))} 
            }catch(e){alert("Server Error")} 
            finally{b.innerText="Get OTP";b.disabled=false;} 
        }
        
        async function verifyOTP() { 
            const i=document.querySelectorAll('.otp-input'); let o=''; i.forEach(x=>o+=x.value); 
            if(o.length!==4){alert("Enter 4-digit code");return;} 
            const b=document.getElementById('verifyBtn'); 
            b.innerHTML='<iconify-icon icon="lucide:loader-2" width="18" class="animate-spin"></iconify-icon> Verifying...'; 
            b.disabled=true; 
            try{ 
                const r=await fetch(`${API_URL}/api/verify-otp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:currentPhone,otp:o})}); 
                const d=await r.json(); 
                if(d.success){ 
                    localStorage.setItem('nc_userPhone',currentPhone); 
                    if(d.isNew){ 
                        document.getElementById('otpStep').classList.add('hidden'); 
                        document.getElementById('profileStep').classList.remove('hidden'); 
                    }else{ 
                        localStorage.setItem('nc_isLoggedIn','true'); 
                        localStorage.setItem('nc_userName',d.user.name||'User'); 
                        showSuccessModal(); 
                        setTimeout(()=>window.location.href='index.html',2000); 
                    } 
                }else{alert("Invalid OTP")} 
            }catch(e){alert("Error")} 
            finally{b.innerText="Verify & Login";b.disabled=false;} 
        }
        
        async function saveProfile(e) { 
            e.preventDefault(); 
            const n=document.getElementById('profileName').value; 
            const d=document.getElementById('profileDob').value; 
            const g=document.querySelector('input[name="gender"]:checked').value; 
            const b=document.getElementById('saveProfileBtn'); 
            b.innerHTML='<iconify-icon icon="lucide:loader-2" width="18" class="animate-spin"></iconify-icon> Saving...'; 
            b.disabled=true; 
            try{ 
                await fetch(`${API_URL}/api/update-profile`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:currentPhone,name:n,dob:d,gender:g})}); 
                localStorage.setItem('nc_isLoggedIn','true'); 
                localStorage.setItem('nc_userName',n); 
                localStorage.setItem('nc_userPhone',currentPhone); 
                localStorage.setItem('nc_userDob',d); 
                localStorage.setItem('nc_userGender',g); 
                showSuccessModal(); 
                setTimeout(()=>window.location.href='index.html',2000); 
            }catch(e){alert("Error")} 
            finally{b.innerText="Save & Continue";b.disabled=false;} 
        }
        
        function goBack(s){ if(s===1){document.getElementById('otpStep').classList.add('hidden');document.getElementById('phoneStep').classList.remove('hidden');} }
        function moveToNext(c,i){if(c.value.length===1&&i<=4){const x=document.querySelectorAll('.otp-input');if(x[i])x[i].focus();}}
    </script>
</body>
</html>
